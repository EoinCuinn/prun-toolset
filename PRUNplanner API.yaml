openapi: 3.0.3
info:
  title: PRUNplanner API
  version: 1.0.0
  description: API endpoints for PRUNplanner.org allowing Empire and Base planning
    and management
paths:
  /analytics/planet_insights/{planet_natural_id}/:
    get:
      operationId: analytics_planet_insights_retrieve
      summary: Fetch planet insights by Planet Natural Id
      parameters:
      - in: path
        name: planet_natural_id
        schema:
          type: string
        required: true
      tags:
      - analytics
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsPlanAggregate'
          description: ''
  /analytics/planning_insights/materials/:
    get:
      operationId: analytics_planning_insights_materials_retrieve
      summary: Fetch planning insights for materials
      tags:
      - analytics
      responses:
        '200':
          description: No response body
  /data/buildings/:
    get:
      operationId: data_buildings_list
      summary: List all buildings
      tags:
      - data
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GameBuilding'
          description: ''
  /data/cxpc/{ticker}/:
    get:
      operationId: exchange_cxpc_all
      summary: Get ticker CXPC data (All Exchanges)
      parameters:
      - in: path
        name: ticker
        schema:
          type: string
        required: true
      tags:
      - data
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GameExchangeCXPC'
          description: ''
  /data/cxpc/{ticker}/{exchange_code}/:
    get:
      operationId: exchange_cxpc_specific
      summary: Get ticker CXPC data for specific Exchange
      parameters:
      - in: path
        name: exchange_code
        schema:
          type: string
        required: true
      - in: path
        name: ticker
        schema:
          type: string
        required: true
      tags:
      - data
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GameExchangeCXPC'
          description: ''
  /data/exchanges/:
    get:
      operationId: data_exchanges_list
      summary: List all exchanges
      tags:
      - data
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GameExchange'
          description: ''
  /data/exchanges/csv/:
    get:
      operationId: data_exchanges_csv_retrieve
      summary: List all exchanges
      tags:
      - 'data : csv'
      responses:
        '200':
          content:
            text/csv:
              schema:
                type: string
              examples:
                CSVExample:
                  value: |
                    ticker,exchange_code,ticker_id,date_epoch,calendar_date,exchange_status,vwap_daily,vwap_7d,vwap_30d,traded_daily,sum_traded_7d,sum_traded_30d,avg_traded_7d,avg_traded_30d,ask,bid,supply,demand
                    AAR,AI1,AAR.AI1,1772323200000,2026-03-01,ACTIVE,0.0,16100.0,16077.0,0.0,16.0,200.0,2.6666666666666665,11.764705882352942,500,200,5,42
                    BBH,NC1,BBH.NC1,1772323200000,2026-03-01,ACTIVE,2900.0,2891.514476614699,2215.1506948034653,63.0,898.0,63831.0,128.28571428571428,2127.7,500,200,5,42
                    OVE,AI1,OVE.AI1,1772323200000,2026-03-01,ACTIVE,128.66921119592877,128.372457796092,127.6020758545341,1572.0,7523.0,51256.0,1074.7142857142858,1708.5333333333333,500,200,5,42
                  summary: Example of the CSV output
          description: ''
  /data/ingest/{token}:
    post:
      operationId: webhook_ingest
      summary: Webhook Ingest
      parameters:
      - in: path
        name: token
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - data
      requestBody:
        content:
          application/json:
            schema: {}
      responses:
        '202':
          description: Payload accepted and queued for processing
        '400':
          description: Invalid JSON structure received
        '404':
          description: Invalid or revoked webhook token
  /data/materials/:
    get:
      operationId: data_materials_list
      summary: List all materials
      tags:
      - data
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GameMaterial'
          description: ''
  /data/planet/{planet_natural_id}/:
    get:
      operationId: data_planet_retrieve
      summary: Fetch a single planet by its Planet Natural Id
      parameters:
      - in: path
        name: planet_natural_id
        schema:
          type: string
        required: true
      tags:
      - data
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GamePlanet'
          description: ''
  /data/planet/{planet_natural_id}/popr/:
    get:
      operationId: data_planet_popr_retrieve
      summary: Get planets latest population report
      parameters:
      - in: path
        name: planet_natural_id
        schema:
          type: string
        required: true
      tags:
      - data
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GamePlanetInfrastructureReport'
          description: ''
  /data/planets/:
    get:
      operationId: data_planets_list
      summary: List all planets
      tags:
      - data
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GamePlanet'
          description: ''
  /data/planets/{search_term}/:
    get:
      operationId: data_planets_retrieve
      summary: Search a single planet by its Planet Natural Id or Name
      parameters:
      - in: path
        name: search_term
        schema:
          type: string
        required: true
      tags:
      - data
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GamePlanet'
          description: ''
  /data/planets/multiple/:
    post:
      operationId: data_planets_multiple_create
      summary: Fetch multiple planets by their Planet Natural Ids
      tags:
      - data
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
          application/x-www-form-urlencoded:
            schema:
              type: array
              items:
                type: string
          multipart/form-data:
            schema:
              type: array
              items:
                type: string
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GamePlanet'
          description: ''
  /data/planets/search/:
    post:
      operationId: data_planets_search_create
      summary: Search for planets by various parameters
      tags:
      - data
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanetSearch'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PlanetSearch'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PlanetSearch'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GamePlanet'
          description: ''
  /data/recipes/:
    get:
      operationId: data_recipes_list
      summary: List all recipes
      tags:
      - data
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GameRecipe'
          description: ''
  /data/storage/:
    get:
      operationId: data_storage_retrieve
      summary: Retrieve users storage data
      tags:
      - data
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameStorage'
          description: ''
  /planning/cx/:
