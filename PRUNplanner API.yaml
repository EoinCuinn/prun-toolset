    post:
      operationId: planning_cx_create
      summary: Creates a new cx preference
      tags:
      - 'planning : cx'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanningCXDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PlanningCXDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PlanningCXDetail'
        required: true
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanningCXDetail'
          description: ''
  /planning/cx/{id}/:
    get:
      operationId: planning_cx_retrieve
      summary: Get a users specific cx preference
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - 'planning : cx'
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanningCXDetail'
          description: ''
    put:
      operationId: planning_cx_update
      summary: Updates an existing cx preference
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - 'planning : cx'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanningCXDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PlanningCXDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PlanningCXDetail'
        required: true
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanningCXDetail'
          description: ''
    delete:
      operationId: planning_cx_destroy
      summary: Delete a specific cx preference
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - 'planning : cx'
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - basicAuth: []
      responses:
        '204':
          description: No response body
  /planning/cx/junctions/:
    post:
      operationId: planning_cx_junctions_create
      summary: Update cx-empire junctions
      tags:
      - 'planning : cx'
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/PlanningCXJunctionUpdate'
          application/x-www-form-urlencoded:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/PlanningCXJunctionUpdate'
          multipart/form-data:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/PlanningCXJunctionUpdate'
        required: true
      security:
      - jwtAuth: []
      - ApiKeyAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlanningCXDetail'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanningCXJunctionsSyncError'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanningCXJunctionsSyncError'
          description: ''
