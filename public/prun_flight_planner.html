<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrUn Flight Planner</title>
<style>
  :root {
    --bg: #0f1117; --bg2: #181c27; --bg3: #1e2333;
    --border: #2a3045; --text: #e2e8f0; --text2: #8892a4; --text3: #555f72;
    --accent: #4f8ef7; --green: #4ade80; --orange: #fb923c; --red: #f87171;
    --yellow: #facc15; --mono: 'Courier New', monospace; --radius: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; padding: 1.5rem; min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }

  /* ── Header ── */
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .header h1 { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text2); display: flex; align-items: center; gap: 8px; }
  .header h1::before { content: ''; display: inline-block; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
  .key-input { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text2); padding: 5px 10px; font-size: 12px; font-family: var(--mono); width: 260px; }
  .key-input::placeholder { color: var(--text3); }
  .btn-sm { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text2); padding: 5px 14px; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); }
  .status-dot.ok { background: var(--green); }
  .status-dot.err { background: var(--red); }

  /* ── Layout ── */
  .planner { display: grid; grid-template-columns: 300px 1fr; gap: 1.25rem; align-items: start; }
  @media (max-width: 760px) { .planner { grid-template-columns: 1fr; } }

  /* ── Panels ── */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
  .card + .card { margin-top: 0.75rem; }
  .card-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 0.75rem; }

  /* ── Searchable input ── */
  .search-wrap { position: relative; }
  .search-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 6px 10px; font-size: 12px; outline: none; transition: border-color 0.15s; }
  .search-input:focus { border-color: var(--accent); }
  .search-input.resolved { border-color: #2d5a2d; color: var(--green); }
  .search-input.unresolved { border-color: #5a2d2d; color: var(--red); }
  .search-drop { position: absolute; top: calc(100% + 3px); left: 0; right: 0; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); max-height: 220px; overflow-y: auto; z-index: 100; display: none; }
  .drop-item { padding: 6px 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
  .drop-item:hover { background: var(--bg2); }
  .drop-item .drop-code { color: var(--text3); font-family: var(--mono); font-size: 11px; }
  .drop-item .drop-name { color: var(--text); }
  .drop-item .drop-sys  { color: var(--text2); font-size: 11px; }

  /* ── Route arrows ── */
  .route-row { display: flex; align-items: center; gap: 8px; margin-bottom: 0.5rem; }
  .route-label { font-size: 10px; color: var(--text3); font-family: var(--mono); letter-spacing: 0.08em; width: 32px; flex-shrink: 0; }
  .route-arrow { color: var(--text3); font-size: 16px; text-align: center; padding: 4px 0; }

  /* ── Fuel slider ── */
  .fuel-row { display: flex; align-items: center; gap: 10px; }
  .fuel-slider { flex: 1; accent-color: var(--accent); }
  .fuel-val { font-family: var(--mono); font-size: 12px; color: var(--accent); min-width: 70px; text-align: right; }
  input[type=range] { cursor: pointer; }

  /* ── Ship select ── */
  .ship-select { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 6px 10px; font-size: 12px; outline: none; }
  .ship-meta { margin-top: 6px; font-size: 11px; color: var(--text3); line-height: 1.6; font-family: var(--mono); }
  .ship-meta span { color: var(--text2); }

  /* ── Mode toggle ── */
  .mode-toggle { display: inline-flex; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .mode-btn { background: var(--bg3); border: none; color: var(--text2); padding: 5px 12px; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .mode-btn.active { background: #1e3a5f; color: var(--accent); }
  .mode-btn:not(.active):hover { color: var(--text); }

  /* ── Component selector ── */
  .comp-row { display: grid; grid-template-columns: 74px 1fr 46px; gap: 6px; align-items: center; margin-bottom: 5px; }
  .comp-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
  .comp-sel { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 4px 6px; font-size: 11px; outline: none; }
  .comp-qty { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 4px 4px; font-size: 11px; text-align: center; outline: none; }
  .comp-dmg { display: flex; flex-wrap: wrap; gap: 4px 10px; margin-top: 4px; }
  .comp-dmg label { font-size: 10px; color: var(--text2); display: inline-flex; align-items: center; gap: 3px; cursor: pointer; }

  /* ── Loadout rows ── */
  .load-row { display: grid; grid-template-columns: 56px 1fr 68px; gap: 8px; align-items: center; margin-bottom: 5px; }
  .load-lbl { font-size: 11px; color: var(--text3); }

  /* ── Calc button ── */
  .calc-btn { width: 100%; background: #1e3a5f; border: 1px solid var(--accent); border-radius: var(--radius); color: var(--accent); padding: 8px; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; margin-top: 0.5rem; }
  .calc-btn:hover { background: #26487a; }
  .calc-btn:disabled { opacity: 0.4; cursor: default; }

  /* ── Results ── */
  .results-empty { color: var(--text3); font-size: 12px; text-align: center; padding: 2rem; }
  .leg { margin-bottom: 0.75rem; }
  .leg-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .leg-type { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 1px 6px; border-radius: 3px; font-family: var(--mono); }
  .leg-type.to   { background: #1a2a1a; color: var(--green); }
  .leg-type.ftl  { background: #1a1a3a; color: var(--accent); }
  .leg-type.stl  { background: #2a1a1a; color: var(--orange); }
  .leg-type.ldg  { background: #1a2a1a; color: var(--green); }
  .leg-dest { color: var(--text2); font-size: 12px; }
  .leg-body { border-left: 2px solid var(--border); padding-left: 10px; margin-left: 4px; }
  .leg-stat { display: flex; justify-content: space-between; align-items: baseline; padding: 1px 0; }
  .leg-stat .k { color: var(--text3); font-size: 11px; }
  .leg-stat .v { color: var(--text); font-size: 12px; font-family: var(--mono); }
  .leg-stat .v.approx { color: var(--yellow); }
  .leg-dmg { color: var(--orange); }
  .leg-dmg.high { color: var(--red); }

  /* ── Divider / Total ── */
  .results-divider { border: none; border-top: 1px solid var(--border); margin: 0.75rem 0; }
  .total-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .total-row .k { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); }
  .total-row .v { font-family: var(--mono); font-size: 14px; color: var(--text); }
  .total-row .v.dmg { color: var(--orange); }
  .total-row .v.dmg.high { color: var(--red); }

  /* ── Hazard badges ── */
  .hz { display: inline-flex; gap: 4px; align-items: center; flex-wrap: wrap; margin-top: 3px; }
  .hz-badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 700; letter-spacing: 0.08em; }
  .hz-met   { background: #2a1f0d; color: var(--orange); }
  .hz-rad   { background: #1a2a2a; color: #5eead4; }
  .hz-heat  { background: #2a1515; color: var(--red); }
  .hz-grav  { background: #1a1a2a; color: var(--accent); }

  /* ── Warning note ── */
  .note { font-size: 11px; color: var(--text3); margin-top: 0.5rem; line-height: 1.5; }
  .note .hl { color: var(--yellow); }
</style>
</head>
<body>

<div class="header">
  <h1>Flight Planner</h1>
  <div class="mode-toggle">
    <button id="modeReal" class="mode-btn active" onclick="setMode('real')">Real Fleet</button>
    <button id="modeHypo" class="mode-btn" onclick="setMode('hypo')">Hypothetical</button>
  </div>
  <input id="fioKey" class="key-input" placeholder="FIO API key (read-only)" autocomplete="off">
  <input id="fioUser" class="key-input" placeholder="FIO username" autocomplete="off">
  <button class="btn-sm" onclick="loadShips()">Load Fleet</button>
  <div id="shipDot" class="status-dot"></div>
</div>

<div class="planner">

  <!-- LEFT: inputs -->
  <div>
    <!-- Ship (Real Fleet) -->
    <div class="card" id="realShipCard">
      <div class="card-label">Ship — Real Fleet</div>
      <select id="shipSelect" class="ship-select" onchange="onShipChange()">
        <option value="">— load fleet, then select —</option>
      </select>
      <div id="shipMeta" class="ship-meta"></div>
    </div>

    <!-- Ship (Hypothetical) -->
    <div class="card" id="hypoShipCard" style="display:none">
      <div class="card-label">Ship — Hypothetical Build</div>
      <div id="componentSelectors"></div>
      <div id="hypoMeta" class="ship-meta"></div>
    </div>

    <!-- Loadout / onboard mass -->
    <div class="card" id="loadoutCard">
      <div class="card-label">Loadout (fuel in units, cargo in t)</div>
      <div class="load-row">
        <span class="load-lbl">STL fuel</span>
        <input id="stlMassSlider" class="fuel-slider" type="range" min="0" max="3500" step="1" value="500" oninput="onLoadoutChange()">
        <span id="stlMassVal" class="fuel-val">500 u</span>
      </div>
      <div class="load-row">
        <span class="load-lbl" title="Scales DEP &amp; APPROACH fuel burn (game fuel usage setting)">Fuel use</span>
        <input id="fufInput" class="fuel-slider" type="range" min="0.05" max="1.0" step="0.05" value="0.50" oninput="document.getElementById('fufVal').textContent=(+this.value).toFixed(2); calculate()">
        <span id="fufVal" class="fuel-val">0.50</span>
      </div>
      <div class="load-row">
        <span class="load-lbl">FTL fuel</span>
        <input id="ftlMassSlider" class="fuel-slider" type="range" min="0" max="2000" step="1" value="200" oninput="onLoadoutChange()">
        <span id="ftlMassVal" class="fuel-val">200 u</span>
      </div>
      <div class="load-row">
        <span class="load-lbl">Cargo</span>
        <input id="cargoMassSlider" class="fuel-slider" type="range" min="0" max="5000" step="0.1" value="0" oninput="onLoadoutChange()">
        <span id="cargoMassVal" class="fuel-val">0 t</span>
      </div>
      <div id="massReadout" class="note" style="margin-top:6px"></div>
    </div>

    <!-- Route -->
    <div class="card">
      <div class="card-label">Route</div>
      <div class="route-row">
        <span class="route-label">FROM</span>
        <div class="search-wrap" style="flex:1">
          <input id="originInput" class="search-input" placeholder="Planet or system…" autocomplete="off" oninput="filterDrop('origin')" onfocus="filterDrop('origin')">
          <div id="originDrop" class="search-drop"></div>
        </div>
      </div>
      <div class="route-arrow">↓</div>
      <div class="route-row">
        <span class="route-label">TO</span>
        <div class="search-wrap" style="flex:1">
          <input id="destInput" class="search-input" placeholder="Planet or system…" autocomplete="off" oninput="filterDrop('dest')" onfocus="filterDrop('dest')">
          <div id="destDrop" class="search-drop"></div>
        </div>
      </div>
    </div>

    <!-- STL fuel for leg is no longer a user input — it is fully derived from the fuel usage
         factor (in the Loadout card) applied to each segment's physics-computed max. -->

    <!-- FTL Reactor -->
    <div class="card">
      <div class="card-label">FTL Reactor (ρ)</div>
      <div class="fuel-row">
        <input id="rufSlider" class="fuel-slider" type="range" min="10" max="100" value="100" oninput="onRufChange()">
        <span id="rufVal" class="fuel-val">100%</span>
      </div>
      <div id="rufInfo" class="note" style="margin-top:6px"></div>
    </div>

    <!-- Calculate -->
    <button class="calc-btn" onclick="calculate()">Calculate Route</button>
  </div>

  <!-- RIGHT: results -->
  <div class="card" id="results">
    <div class="results-empty">Enter origin and destination to plan a route.</div>
  </div>

</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
// Ship data comes from the Swagger API (api.fnar.net/ships), richer than REST and
// confirmed working 2026-07-02. Header form is `FIOAPIKey <key>` (not the raw key).
// Response shape: UserNameToData.<user>.Data[]. Key is read-only.
const SWAGGER_SHIPS = 'https://api.fnar.net/ships';
// Ship fuel stores — resolve StorageId → WeightLoad/WeightCapacity to prefill the loadout.
// The /storage URL is built per-request from the user's FIO username (see loadShips).
const FIO_KEY       = 'prun_apikey';    // localStorage key for the FIO API key
const FIO_USER      = 'prun_fiouser';   // localStorage key for the FIO username
const FP_SCALE   = 12.0;     // coordinate units per parsec — paper §12.5: exactly 12

// FTL reactor physics — paper §12.1–12.3 and §13.5
// Jump time: t = A · e^(-β·ρ) · d_ftl  [seconds, per hop, d_ftl in parsecs]
// Charge:    t = c · ρ                  [seconds, between consecutive lane jumps]
// c = (3/8) · reactorPower / chargeFactor  (paper eq.24, exact)
// β = κ · reactorPower  (κ ≈ 4.4e-4, paper §13.5)
// A from emitter loadout — low-power reactors (≤2400): A≈2804; high-power (≥4800): A≈2362
// These values are paper estimates (±5%); calibrate against APEX for exact ship constants.
const FTL_REACTORS = {
  2000: { c: 75,  A: 2804, beta: 4.4e-4 * 2000 },  // Quick-Charge (P=2000, f=10)
  2400: { c: 450, A: 2804, beta: 4.4e-4 * 2400 },  // Standard     (P=2400, f=2)
  4800: { c: 120, A: 2362, beta: 4.4e-4 * 4800 },  // High-Power   (P=4800, f=15)
  7200: { c: 90,  A: 2362, beta: 4.4e-4 * 7200 },  // Hyper-Power  (P=7200, f=30)
};
// Gateway: t = d_ftl/3 hours + 1220s bracket (10+600+600+10) — paper §12.6 eq.19
// Independent of ship and reactor; speed exactly 3 pc/hour = 1200 s/pc.

// STL departure arc constants (Marcus's prun_flight_cold.py)
const GATE_D_PLANET_M = 74798935 * 1000; // gate is 74,798,935 km from planet, in metres
const K_DEPARTURE = 4.0;                 // departure M = sqrt(arc / (K_DEPARTURE × accel))

// Orbital ephemeris — Josh Glass paper (June 2026), Section 10
// M₀=0 for ALL planets at worldTime=0 (hardcoded in APEX client bundle.js keplerian() call)
const REFERENCE_TIME_S = 1451690603; // 2016-01-01 23:23:23 UTC

// GM is computed at load time from star masses in systemstars.json:
// GM [m³/s²] = 6.6743e-11 × star_mass_kg   (real SI, no worldtime conversion needed)
// worldTime() running 20× faster automatically gives 20× orbital speed.
// Stored in _sysGM (SystemId → GM); populated in loadData().

// ── Component data (Phase 3 ground truth, 2026-07-02) ─────────────────────────
// Masses are on the SAME numeric scale as the raw Swagger OperatingEmptyMass / Mass
// values — used directly, with NO unit conversion anywhere in the mass path. Thrust in
// Newtons. accel = min(thrust/totalMass, maxGFactor·9.80665), totalMass = empty + stl +
// ftl + cargo. Verified: Thrust[N] / raw Mass == Swagger Acceleration fleet-wide
// (100000 / 2153.5 = 46.44). The spec labels this scale "kg"; do not multiply/divide by 1000.
const COMPONENT_DATA = {
  hull: {   // atomic baseline — includes bridge, quarters, structural. maxGFactor sets G-cap.
    LHP: { name: 'lightweightHullPlate', mass: 579.8, maxGFactor: 10 },
    BHP: { name: 'basicHullPlate',       mass: 819.8, maxGFactor: 8  },
    RHP: { name: 'reinforcedHullPlate',  mass: 867.8, maxGFactor: 11 },
    HHP: { name: 'hardenedHullPlate',    mass: 867.8, maxGFactor: 13 },
    AHP: { name: 'advancedHullPlate',    mass: 867.8, maxGFactor: 15 },
  },
  engine: { // mass additive on hull base; thrust additive across engines
    GEN: { name: 'glassEngine',       mass: 5,  thrust: 50000  },
    FSE: { name: 'fuelSavingEngine',  mass: 6,  thrust: 100000 },
    ENG: { name: 'standardEngine',    mass: 8,  thrust: 125000 },
    AEN: { name: 'advancedEngine',    mass: 14, thrust: 250000 },
    HTE: { name: 'hyperthrustEngine', mass: 16, thrust: 450000 },
  },
  stlTank:  { SSL: { name: 'smallStlTank', mass: 20 }, MSL: { name: 'mediumStlTank', mass: 50 }, LSL: { name: 'largeStlTank', mass: 125 } },
  ftlReactor: { RCT: { name: 'standardReactor', mass: 7 }, QCR: { name: 'quickChargeReactor', mass: 14 }, HPR: { name: 'highPowerReactor', mass: 16 }, HYR: { name: 'hyperPowerReactor', mass: 25 } },
  ftlTank:  { SFL: { name: 'smallFtlTank', mass: 9 }, MFL: { name: 'mediumFtlTank', mass: 24 }, LFL: { name: 'largeFtlTank', mass: 60 } },
  cargo: {  // real fitted mass (NOT bomWeight). capT = tonnes ceiling, capM3 = volume ceiling
    TCB: { name: 'tinyCargoBay',      mass: 630,    capT: 100,  capM3: 100  },
    VSC: { name: 'verySmallCargoBay', mass: 707.1,  capT: 250,  capM3: 250  },
    SCB: { name: 'smallCargoBay',     mass: 827.8,  capT: 500,  capM3: 500  },
    MCB: { name: 'mediumCargoBay',    mass: 1046.8, capT: 1000, capM3: 1000 },
    LCB: { name: 'largeCargoBay',     mass: 1456.2, capT: 2000, capM3: 2000 },
    HCB: { name: 'hugeCargoBay',      mass: 2517.4, capT: 5000, capM3: 5000 },
    VCB: { name: 'highVolumeCargoBay',mass: 1747.6, capT: 1000, capM3: 3000 },
    WCB: { name: 'highLoadCargoBay',  mass: 1146.8, capT: 3000, capM3: 1000 },
  },
  seat: {   // mass additive; maxGFactor bonus additive on hull maxGFactor
    BGS: { name: 'basicHighgSeats',    mass: 20, gBonus: 5  },
    AGS: { name: 'advancedHighgSeats', mass: 30, gBonus: 12 },
  },
  damage: { // tiny mass except repair drones; do not affect accel meaningfully
    BPT: { name: 'basicHeatShield',           mass: 0.02 },
    APT: { name: 'advancedHeatShield',        mass: 0.03 },
    BWH: { name: 'basicWhippleShielding',     mass: 0.1  },
    AWH: { name: 'advancedWhippleShielding',  mass: 0.12 },
    STS: { name: 'stabilitySupportSystem',    mass: 0.1  },
    BRP: { name: 'basicRadiationShielding',   mass: 0.03 },
    ARP: { name: 'advancedRadiationShielding',mass: 0.04 },
    SRP: { name: 'specializedRadiationShielding', mass: 0.1 },
    RDS: { name: 'smallShipRepairDroneUnit',  mass: 50   },
    RDL: { name: 'largeShipRepairDroneUnit',  mass: 150  },
  },
};
// FTL reactor ticker → ReactorPower (keys of FTL_REACTORS). From spec §3 reactor comments.
const REACTOR_POWER = { QCR: 2000, RCT: 2400, HPR: 4800, HYR: 7200 };
const G0 = 9.80665;  // m/s² — G-cap factor
// Fuel mass per unit (t/unit): STL fuel SF = 0.06, FTL fuel FF = 0.05. Loadout fuel
// sliders display UNITS; internal mass math converts units → tonnes via these.
const STL_UNIT_MASS = 0.06;
const FTL_UNIT_MASS = 0.05;

// ── Orbital ephemeris ────────────────────────────────────────────────────────

function worldTime(unixT) {
  return REFERENCE_TIME_S + (unixT - REFERENCE_TIME_S) * 20;
}

function solveKepler(M_anom, ecc) {
  let E = M_anom;
  for (let i = 0; i < 50; i++) {
    const dE = (M_anom - E + ecc * Math.sin(E)) / (1 - ecc * Math.cos(E));
    E += dE;
    if (Math.abs(dE) < 1e-12) break;
  }
  return E;
}

function planetXY(unixT, a_m, ecc, GM_wt) {
  const wt  = worldTime(unixT);
  const n   = Math.sqrt(GM_wt / (a_m * a_m * a_m));
  const M_a = ((n * wt) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  const E   = solveKepler(M_a, ecc);
  return { x: a_m * (Math.cos(E) - ecc), y: a_m * Math.sqrt(1 - ecc * ecc) * Math.sin(E) };
}

// 3D position — OrbitRightAscension=0, OrbitPeriapsis=0 for all PrUn planets,
// so inclination is a simple tilt of the y component. inc in radians.
function planetXYZ(unixT, a_m, ecc, inc, GM_wt) {
  const wt    = worldTime(unixT);
  const n     = Math.sqrt(GM_wt / (a_m * a_m * a_m));
  const M_a   = ((n * wt) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  const E     = solveKepler(M_a, ecc);
  const x_orb = a_m * (Math.cos(E) - ecc);
  const y_orb = a_m * Math.sqrt(1 - ecc * ecc) * Math.sin(E);
  return { x: x_orb, y: y_orb * Math.cos(inc), z: y_orb * Math.sin(inc) };
}

// Planet position from Marcus's fitted ephemeris — unixT in real seconds.
// Returns {x,y,z} in metres, or null if planet not in ephemeris.
// Ephemeris entry: [e, n, M0, peri, p_km, ux, uy, uz, wx, wy, wz]
function planetXYZFromEph(naturalId, unixT) {
  const b = _ephemeris[naturalId];
  if (!b) return null;
  const [e, n, M0, peri, p_km, ux, uy, uz, wx, wy, wz] = b;
  const Ma = M0 + n * unixT;
  const E  = solveKepler(Ma, e);
  const nu = 2 * Math.atan2(Math.sqrt(1 + e) * Math.sin(E / 2), Math.sqrt(1 - e) * Math.cos(E / 2));
  const r  = p_km / (1 + e * Math.cos(nu));
  const th = peri + nu;
  const ct = r * Math.cos(th), st = r * Math.sin(th);
  const KM_TO_M = 1000;
  return {
    x: (ct * ux + st * wx) * KM_TO_M,
    y: (ct * uy + st * wy) * KM_TO_M,
    z: (ct * uz + st * wz) * KM_TO_M,
  };
}

// ── Carlson symmetric elliptic integrals (machine precision) ──────────────────

function carlsonRF(x, y, z) {
  let xi = x, yi = y, zi = z;
  let mu = (xi+yi+zi)/3;
  let dx = (mu-xi)/mu, dy = (mu-yi)/mu, dz = (mu-zi)/mu;
  for (let n = 0; n < 50; n++) {
    if (Math.max(Math.abs(dx), Math.abs(dy), Math.abs(dz)) <= 1e-10) break;
    const lam = Math.sqrt(xi*yi) + Math.sqrt(yi*zi) + Math.sqrt(zi*xi);
    xi = (xi+lam)/4; yi = (yi+lam)/4; zi = (zi+lam)/4;
    mu = (xi+yi+zi)/3;
    dx = (mu-xi)/mu; dy = (mu-yi)/mu; dz = (mu-zi)/mu;
  }
  const E2 = dx*dy - dz*dz, E3 = dx*dy*dz;
  return (1 - E2/10 + E3/14 + E2*E2/24 - 3*E2*E3/44) / Math.sqrt(mu);
}

function carlsonRD(x, y, z) {
  let xi = x, yi = y, zi = z, sum = 0, fac = 1;
  let mu = (xi+yi+3*zi)/5;
  let dx = (mu-xi)/mu, dy = (mu-yi)/mu, dz = (mu-zi)/mu;
  for (let n = 0; n < 50; n++) {
    if (Math.max(Math.abs(dx), Math.abs(dy), Math.abs(dz)) <= 1e-10) break;
    const lam = Math.sqrt(xi*yi) + Math.sqrt(yi*zi) + Math.sqrt(zi*xi);
    sum += fac / (Math.sqrt(zi) * (zi + lam));
    xi = (xi+lam)/4; yi = (yi+lam)/4; zi = (zi+lam)/4;
    fac *= 0.25;
    mu = (xi+yi+3*zi)/5;
    dx = (mu-xi)/mu; dy = (mu-yi)/mu; dz = (mu-zi)/mu;
  }
  const E2 = dx*dy - 6*dz*dz, E3 = dx*dy*dz;
  return 3*sum + fac*(1 - 3*E2/14 + E3/6 + 9*E2*E2/88 - 9*E2*E3/52)/(mu*Math.sqrt(mu));
}

// Incomplete elliptic integral E(ψ, m) — paper eq.10 integrand, Carlson form
function ellipticEIncomplete(psi, m) {
  if (psi === 0) return 0;
  const s = Math.sin(psi), c2 = Math.cos(psi) ** 2;
  const y = 1 - m * s * s;
  if (y <= 0) return s;
  return s * carlsonRF(c2, y, 1) - (m / 3) * s * s * s * carlsonRD(c2, y, 1);
}

// ── SLT charged distance — 3D focal ellipse + rank-one reduction ──────────────
// Inputs: departure O and arrival P in metres (3D Cartesian, star at origin).
// Returns { chargedKm, arcKm, isReduced } — chargedKm is what the game bills.
// Paper §8 (arc) + Scaffolding §16 (rank-one directional reduction surrogate).
function calculateSltDistance3D(Ox, Oy, Oz, Px, Py, Pz) {
  const rO = Math.hypot(Ox, Oy, Oz), rP = Math.hypot(Px, Py, Pz);
  if (!rO || !rP) return null;

  const a = (rO + rP) / 2;
  const dx = Px-Ox, dy = Py-Oy, dz = Pz-Oz;
  const u = Math.hypot(dx, dy, dz);
  if (u < 1) return { chargedKm: 0, arcKm: 0, isReduced: false };

  const uhx = dx/u, uhy = dy/u, uhz = dz/u;

  const Nhx = 0, Nhy = 0, Nhz = 1;

  // In-plane perpendicular to chord: e2 = N_hat × u_hat
  const e2x = Nhy*uhz - Nhz*uhy;
  const e2y = Nhz*uhx - Nhx*uhz;
  const e2z = Nhx*uhy - Nhy*uhx;

  // Focal construction — second focus via focal-radius swap
  const s = (rP*rP - rO*rO + u*u) / (2*u);
  const h2 = rP*rP - s*s;
  if (h2 < 0) return null;
  const h = Math.sqrt(h2);

  // starCross > 0 means star is on the right of chord S→P; prograde O' goes LEFT (sign=+1).
  const starCross = -(Ox*e2x + Oy*e2y + Oz*e2z);
  const sign = starCross > 0 ? 1 : -1;

  const Fpx = Ox + s*uhx + sign*h*e2x;
  const Fpy = Oy + s*uhy + sign*h*e2y;
  const Fpz = Oz + s*uhz + sign*h*e2z;

  const Cx = Fpx/2, Cy = Fpy/2, Cz = Fpz/2;
  const c = Math.hypot(Cx, Cy, Cz);
  if (c >= a) return null;

  const m = Math.min((c/a)**2, 0.999999999);
  const b = a * Math.sqrt(1 - m);

  // Ellipse axes: major toward star (periapsis), minor = N_hat × major
  const cMag = c || 1;
  const majHx = -Cx/cMag, majHy = -Cy/cMag, majHz = -Cz/cMag;
  const minHx = Nhy*majHz - Nhz*majHy;
  const minHy = Nhz*majHx - Nhx*majHz;
  const minHz = Nhx*majHy - Nhy*majHx;

  // Eccentric anomalies via 3D dot-product projection
  const SOx = Ox-Cx, SOy = Oy-Cy, SOz = Oz-Cz;
  const POx = Px-Cx, POy = Py-Cy, POz = Pz-Cz;
  const E1 = Math.atan2((SOx*minHx+SOy*minHy+SOz*minHz)/b, (SOx*majHx+SOy*majHy+SOz*majHz)/a);
  const E2 = Math.atan2((POx*minHx+POy*minHy+POz*minHz)/b, (POx*majHx+POy*majHy+POz*majHz)/a);

  const deltaE = ((E2-E1+Math.PI) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI) - Math.PI;
  const psi = Math.abs(deltaE) / 2;

  const l = 2 * a * ellipticEIncomplete(psi, m);
  const e_transfer = Math.sqrt(m);

  if (deltaE >= 0) {
    return { chargedKm: l/1000, arcKm: l/1000, isReduced: false };
  } else {
    let factor = 1.0;
    if (_reductionSurface) {
      const { NE, NA, grid } = _reductionSurface;
      const fe = Math.max(0, Math.min(e_transfer, 1.0)) * (NE - 1);
      const ie = Math.min(Math.floor(fe), NE - 2);
      const te = fe - ie;
      const fa = (E1 + Math.PI) / (2 * Math.PI) * (NA - 1);
      const ia = Math.min(Math.max(Math.floor(fa), 0), NA - 2);
      const ta = fa - ia;
      factor = grid[ie][ia]*(1-te)*(1-ta) + grid[ie+1][ia]*te*(1-ta)
             + grid[ie][ia+1]*(1-te)*ta + grid[ie+1][ia+1]*te*ta;
    } else {
      const sin2p = Math.sin(2 * psi);
      const R = (1/3) * m * sin2p * sin2p;
      factor = 1 - R / ellipticEIncomplete(psi, m);
    }
    const charged = l * factor;
    return { chargedKm: charged/1000, arcKm: l/1000, isReduced: true };
  }
}

// Rendezvous solver — 3D positions, charged distance, converges in ~5 iterations.
// Returns { chargedKm, arcKm, tReal, isReduced } or null.
function stlRendezvous(pl1, pl2, GM, accel, M, nowUnix, getPos1Override, getPos2Override) {
  if (!accel || M <= 0) return null;
  // Station positions come from game exports — same coordinate frame as ephemeris.
  // FIO uses an incompatible frame; mixing FIO with station/eph positions gives wrong distances.
  // Use ephemeris frame when BOTH endpoints are in it (station override counts as eph-frame).
  const id1 = pl1?.PlanetNaturalId, id2 = pl2?.PlanetNaturalId;
  const p1IsEphFrame = !!getPos1Override || !!(id1 && _ephemeris[id1]);
  const p2IsEphFrame = !!getPos2Override || !!(id2 && _ephemeris[id2]);
  const useEphFrame = p1IsEphFrame && p2IsEphFrame;
  const fioGet = (pl, t) => {
    if (!GM || !pl?.OrbitSemiMajorAxis) return null;
    return planetXYZ(t, pl.OrbitSemiMajorAxis, pl.OrbitEccentricity||0, pl.OrbitInclination||0, GM);
  };
  const ephGet = (pl, t) => planetXYZFromEph(pl.PlanetNaturalId, t);
  const getPos1 = getPos1Override || (useEphFrame ? ephGet : fioGet);
  const getPos2 = getPos2Override || (useEphFrame ? ephGet : fioGet);
  const S = getPos1(pl1, nowUnix);
  if (!S) return null;
  let tFlight = 2 * M;
  for (let i = 0; i < 25; i++) {
    const arriveT = nowUnix + tFlight;
    const P = getPos2(pl2, arriveT);
    if (!P) return null;
    const slt = calculateSltDistance3D(S.x, S.y, S.z, P.x, P.y, P.z);
    if (slt == null) return null;
    const d = slt.chargedKm;
    const newT = stlTimeReal(d, M, accel);
    if (newT == null) return null;
    if (Math.abs(newT - tFlight) < 0.5) return { chargedKm: d, arcKm: slt.arcKm, tReal: newT, isReduced: slt.isReduced, approx: !useEphFrame };
    tFlight = newT;
  }
  return null;
}

function sysGM(sysId) {
  return _sysGM[sysId] ?? null;
}

// Planet velocity in km/s via finite difference of position (dt = 0.5s each side).
// getPos: (pl, unixT) → {x,y,z} in metres (same closure used by stlRendezvous).
function planetVelocityKmS(pl, t, getPos) {
  const p1 = getPos(pl, t - 0.5);
  const p2 = getPos(pl, t + 0.5);
  if (!p1 || !p2) return null;
  return { vx: (p2.x - p1.x) / 1000, vy: (p2.y - p1.y) / 1000 };
}

// Solve Kepler's equation M = E - e*sin(E) by Newton-Raphson (converges in <5 iters for e<0.1).
function solveKepler(M, e) {
  let E = M;
  for (let i = 0; i < 15; i++) {
    const dE = (M - E + e * Math.sin(E)) / (1 - e * Math.cos(E));
    E += dE;
    if (Math.abs(dE) < 1e-10) break;
  }
  return E;
}

// Station position in metres.
// Uses Keplerian orbit when e/a_m/n_rad_s/t_peri_s/theta_peri_rad are present,
// otherwise falls back to circular model. Z uses oscillation model when z_amplitude_km present.
function stationXYZ(st, t) {
  if (st.e != null && st.a_m && st.n_rad_s && st.t_peri_s != null) {
    const TAU = 2 * Math.PI;
    const M = ((st.n_rad_s * (t - st.t_peri_s)) % TAU + TAU) % TAU;
    const E = solveKepler(M, st.e);
    const sqep = Math.sqrt(1 + st.e), sqem = Math.sqrt(1 - st.e);
    const f = 2 * Math.atan2(sqep * Math.sin(E / 2), sqem * Math.cos(E / 2));
    const r = st.a_m * (1 - st.e * Math.cos(E));
    const theta = st.theta_peri_rad - f;  // retrograde orbit
    return {
      x: r * Math.cos(theta) * 1000,
      y: r * Math.sin(theta) * 1000,
      z: 0,
    };
  }
  // Circular fallback (for stations without full Keplerian elements).
  const dt = t - st.t_ref_s;
  const theta = st.theta_ref_rad + st.omega_rad_s * dt;
  return {
    x: st.r_km * Math.cos(theta) * 1000,
    y: st.r_km * Math.sin(theta) * 1000,
    z: (st.z_amplitude_km != null
      ? st.z_amplitude_km * Math.sin(st.omega_rad_s * dt + st.z_phi0_rad)
      : st.z_km) * 1000,
  };
}

// Signed angular offset from body's prograde direction to gate, in radians.
// Positive = gate is ahead of prograde, negative = behind.
function progradeAngoff(gate, body, vbody) {
  const prog = body.x * vbody.vy - body.y * vbody.vx;
  let ang = Math.atan2(gate.y, gate.x) - Math.atan2(body.y, body.x);
  ang = ((ang + Math.PI) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI) - Math.PI;
  return ang * (prog !== 0 ? Math.sign(prog) : 1);
}

// Leverage deficit (km) — destination planet's orbital motion reduces approach arc.
// Only active in triangular flight regime. O/P in metres, vbody in km/s, T in real-s.
function leverageDeficit(O, P, vbody, T) {
  const rO = Math.hypot(O.x, O.y), rP = Math.hypot(P.x, P.y);
  if (!rO || !rP) return 0;
  const rho = Math.max(rO, rP) / Math.min(rO, rP);
  const vbm = Math.hypot(vbody.vx, vbody.vy);
  const th = progradeAngoff(O, P, vbody);
  if (!(th > -Math.PI / 2 && th < 0)) return 0;
  return vbm * (rho * rho - 1) * Math.cos(th) * T;
}

// Departure deficit (km) — origin planet's orbital motion reduces departure arc.
// arc/accel in km, M in real-s. O/P in metres, vbody in km/s.
function departureDeficit(arc, M, accel, O, P, vbody) {
  const rO = Math.hypot(O.x, O.y), rP = Math.hypot(P.x, P.y);
  if (!rO || !rP) return 0;
  const rho = Math.max(rO, rP) / Math.min(rO, rP);
  const vbm = Math.hypot(vbody.vx, vbody.vy);
  const th = progradeAngoff(P, O, vbody);
  if (!(th > 0 && th < Math.PI / 2)) return 0;
  const w0 = vbm * (rho * rho - 1) * Math.cos(th);
  return Math.min(2 * M * w0 - w0 * w0 / (2 * accel), 0.95 * arc);
}

// Gate position in metres — GATE_D_PLANET_M from planet toward the neighboring system.
function gatePositionM(base, originSysId, neighborSysId) {
  const sysA = _systems[originSysId], sysB = _systems[neighborSysId];
  if (!sysA || !sysB) return null;
  const vx = sysB.PositionX - sysA.PositionX;
  const vy = sysB.PositionY - sysA.PositionY;
  const vz = sysB.PositionZ - sysA.PositionZ;
  const n = Math.sqrt(vx*vx + vy*vy + vz*vz);
  if (!n) return null;
  return { x: base.x + GATE_D_PLANET_M*vx/n, y: base.y + GATE_D_PLANET_M*vy/n, z: base.z + GATE_D_PLANET_M*vz/n };
}

// Departure leg: planet → jump gate. M set to sqrt(arc/(K_DEP·a)) so ship is at triangular boundary.
// Iterates 4× to apply departure deficit and recompute M. base/gate in metres, vel in km/s, accel in km/s².
// maxM (optional) = STL-fuel budget for the departure (Fix 1). When the boundary M the
// ship wants exceeds what the tank supports, cap M there → slower (trapezoidal) departure.
function departureLegCalc(base, gate, vel, accel, maxM) {
  const slt = calculateSltDistance3D(base.x, base.y, base.z, gate.x, gate.y, gate.z);
  if (!slt) return null;
  const arc0 = slt.arcKm;
  let arc = arc0, M = Math.sqrt(arc0 / (K_DEPARTURE * accel));
  for (let i = 0; i < 4; i++) {
    const def = vel ? Math.max(0, departureDeficit(arc0, M, accel, base, gate, vel)) : 0;
    arc = Math.max(arc0 - def, 0.05 * arc0);
    M = Math.sqrt(arc / (K_DEPARTURE * accel));
  }
  let Mfinal = Math.max(1, Math.ceil(M));
  let starved = false;
  if (maxM != null && maxM > 0 && maxM < Mfinal) { Mfinal = maxM; starved = true; }
  const tReal = stlTimeReal(arc, Mfinal, accel);
  return { arcKm: arc0, chargedKm: arc, M: Mfinal, tReal, starved };
}

// Approach rendezvous from a fixed gate position (metres) to a moving planet.
// Mirrors Marcus's rendezvous_approach; uses user's M for the approach leg.
function stlRendezvousFromGate(gateM, pl2, GM, accel, M, startUnix, getPos2Override) {
  if (!accel || M <= 0) return null;
  const id2 = pl2?.PlanetNaturalId;
  const inEph = !getPos2Override && !!(id2 && _ephemeris[id2]);
  const getPos = getPos2Override || (inEph
    ? (pl, t) => planetXYZFromEph(pl.PlanetNaturalId, t)
    : (pl, t) => {
        if (!GM || !pl?.OrbitSemiMajorAxis) return null;
        return planetXYZ(t, pl.OrbitSemiMajorAxis, pl.OrbitEccentricity||0, pl.OrbitInclination||0, GM);
      });
  let tFlight = 2 * M;
  for (let i = 0; i < 25; i++) {
    const arriveT = startUnix + tFlight;
    const P = getPos(pl2, arriveT);
    if (!P) return null;
    const slt = calculateSltDistance3D(gateM.x, gateM.y, gateM.z, P.x, P.y, P.z);
    if (!slt) return null;
    let d = slt.chargedKm;
    const isTriangular = d <= 4 * accel * M * M;
    if (isTriangular) {
      const vel2 = planetVelocityKmS(pl2, arriveT, getPos);
      if (vel2) d = Math.max(0, d - leverageDeficit(gateM, P, vel2, tFlight));
    }
    const newT = stlTimeReal(d, M, accel);
    if (newT == null) return null;
    if (Math.abs(newT - tFlight) < 0.5) return { chargedKm: d, arcKm: slt.arcKm, tReal: newT, isReduced: slt.isReduced, approx: !inEph && !getPos2Override };
    tFlight = newT;
  }
  return null;
}

// computedMax fuel (units) for a gate→moving-planet APPROACH: the triangular-boundary M where
// d = 4·accel·M² — the max useful STL fuel for the leg, mirroring DEP's dep.M. Self-consistent
// (d depends on M through the moving-target rendezvous), so iterate M ↔ d to convergence.
// Returns { M, rendez } (rendez re-solved at the final integer M) or null.
function approachComputedMax(gateM, pl2, GM, accel, startUnix, getPos2Override) {
  if (!accel) return null;
  let M = 1000;
  for (let i = 0; i < 30; i++) {
    const rz = stlRendezvousFromGate(gateM, pl2, GM, accel, Math.max(1, Math.ceil(M)), startUnix, getPos2Override);
    if (!rz) return null;
    const bM = Math.sqrt(rz.chargedKm / (4 * accel));
    if (Math.abs(bM - M) < 0.3) { M = bM; break; }
    M = bM;
  }
  const Mfinal = Math.max(1, Math.ceil(M));
  const rendez = stlRendezvousFromGate(gateM, pl2, GM, accel, Mfinal, startUnix, getPos2Override);
  return rendez ? { M: Mfinal, rendez } : null;
}

// ── Physics ──────────────────────────────────────────────────────────────────

// Complete elliptic integral of second kind E(m), 8-point Gauss-Legendre
function ellipticE(m) {
  if (m <= 0) return Math.PI / 2;
  if (m >= 1) return 1;
  const x = [0.09501251,0.28160355,0.45801678,0.61787624,0.75540441,0.86563120,0.94457502,0.98940093];
  const w = [0.18945061,0.18260342,0.16915652,0.14959599,0.12462897,0.09515851,0.06225352,0.02715246];
  const h = Math.PI / 4;
  let s = 0;
  for (let i = 0; i < 8; i++) {
    const t1 = h * (1 + x[i]), t2 = h * (1 - x[i]);
    s += w[i] * (Math.sqrt(1 - m * Math.sin(t1) ** 2) + Math.sqrt(1 - m * Math.sin(t2) ** 2));
  }
  return h * s;
}

// Hohmann arc distance (km) from orbital radii (metres) — maximum STL distance (opposite-side)
function hohmannArcKm(rO_m, rP_m) {
  if (!rO_m || !rP_m || rO_m <= 0 || rP_m <= 0) return null;
  const at = (rO_m + rP_m) / 2;
  const et = Math.abs(rP_m - rO_m) / (rO_m + rP_m);
  return 2 * at * ellipticE(et * et) / 1000; // metres → km
}

// Chord (same-side) distance (km) — minimum STL distance
function chordKm(rO_m, rP_m) {
  if (!rO_m || !rP_m || rO_m <= 0 || rP_m <= 0) return null;
  return Math.abs(rP_m - rO_m) / 1000; // metres → km
}

// STL flight time [real-s] — triangular profile when d ≤ 4·accel·M², trapezoidal otherwise
function stlTimeReal(dKm, M, accel) {
  if (!dKm || !M || !accel || M <= 0) return null;
  if (dKm <= 4 * accel * M * M) return 2 * Math.sqrt(dKm / accel);
  return dKm / (2 * accel * M) + 2 * M;
}

// Real-seconds → human readable, in-game "Xh Ym Zs" format (seconds always shown).
function fmtRealTime(realSec) {
  const t = Math.max(0, Math.round(realSec));
  const d = Math.floor(t / 86400);
  const h = Math.floor((t % 86400) / 3600);
  const m = Math.floor((t % 3600) / 60);
  const s = t % 60;
  if (d > 0) return `${d}d ${h}h ${m}m ${s}s`;
  if (h > 0) return `${h}h ${m}m ${s}s`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

// Minutes → human readable (same Xh Ym Zs format).
function fmtMin(min) {
  return fmtRealTime(min * 60);
}

// Atmospheric leg (TO or landing) — paper Section 12.4, corrected in Section 1.2
// d_TO  = (R_m/1000) × (0.1482 + 0.4521·P^0.30)   frame km
// d_LDG = 926 × (R_m/1e6)^0.96 × (1+P)^(-0.42)   frame km  (decreases with pressure)
// tier  = sqrt(d / (13.71 × accel_atm))            server-set speed tier (drives real time)
// t     = tier × (13.71/2 + 2) = tier × 8.855      real-s
// fuel  = tier × (flowRate / 0.015)                STL fuel: the tier's 13.71 has the Standard
//   engine's 0.015 flow rate baked in, so ships with other flow rates scale linearly. Confirmed
//   vs captures 2026-07-11 (0.015 ships match; AVI-072QE @ 0.0075 halves). Time is flow-independent.
function atmLeg(R_m, P, accel, which, flowRate) {
  const accel_atm = accel / 350.11;
  const p = Math.max(0, P || 0);
  const d = (which === 'to')
    ? (R_m / 1000) * (0.1482 + 0.4521 * Math.pow(p, 0.30))
    : 926 * Math.pow(R_m / 1e6, 0.96) * Math.pow(1 + p, -0.42);
  const tier = Math.sqrt(d / (13.71 * accel_atm));    // speed tier → real time (flow-rate independent)
  const fuel = tier * ((flowRate ?? 0.015) / 0.015);  // STL fuel scales linearly with flow rate
  return { dKm: d, M: Math.round(fuel) || 1, tReal: tier * 8.855 };
}

// FTL physics for a ship — returns { c, A, beta } or null
function ftlPhysics(ship) {
  if (!ship?.reactorPower) return null;
  const known = FTL_REACTORS[ship.reactorPower];
  if (known) return { ...known };
  // Unknown reactor power: estimate
  const A    = ship.reactorPower <= 2400 ? 2804 : 2362;
  const beta = 4.4e-4 * ship.reactorPower;
  const c    = (ship.chargeFactor > 0) ? (3/8 * ship.reactorPower / ship.chargeFactor) : null;
  return { c, A, beta, estimated: true };
}

// FTL parsec distance between two system objects
function parsecsBetween(a, b) {
  const dx = a.PositionX - b.PositionX;
  const dy = a.PositionY - b.PositionY;
  const dz = a.PositionZ - b.PositionZ;
  return Math.sqrt(dx * dx + dy * dy + dz * dz) / FP_SCALE;
}

// Meteor damage fraction (unshielded)
// Meteor formula v5 — fitted 2026-07-04
// k=7.1692e-6, p(ρ)=0.683+0.223·log₁₀(ρ), no star-type multipliers
// 19 systems, 2 parameters, R²=0.9989, worst residual 7.1%
// Star-type signal confirmed absent — F/G/K/M all = 1.000
// transitDistKm is the game "charged" STL distance ÷ 1e6 (applied at the CALL SITE); k is fit to that scale.
function meteorDmgRaw(transitDistKm, density) {
  const rhoExp = 0.683 + 0.223 * Math.log10(Math.max(density, 0.001));
  return 7.1692e-6 * transitDistKm * Math.pow(Math.max(0.001, density), rhoExp);
}

// Landing damage fraction (unshielded) — M2 fit, 2026-07-05.
// k=1.1322e-4, 24 points (2 blueprints × 12 planets), R²(log-space)=0.98925,
// worst residual 2.13× (MG-197e, 85 atm — known high-pressure outlier).
// Drivers: stlDist^0.4934 × accel^-0.9441 × pressure^0.9288.
// accel in m/s², stlDist in km (from landingDistKm), pressure in atm; result is damage fraction.
function landingDmgRaw(stlDistKm, accelMs2, pressureAtm) {
  return 1.1322e-4
    * Math.pow(stlDistKm, 0.4934)
    * Math.pow(accelMs2, -0.9441)
    * Math.pow(Math.max(pressureAtm, 0.001), 0.9288);
}

// Landing distance — planet_term, the MEAN of the (randomly-rolled) approach-orbit landing distance.
// Actual landing dist = (20/3) × pressureFactor × (sma − radius); the game rolls the approach-orbit
// altitude with mean ≈ 0.15×radius, and (20/3)×0.15 = 1, so the mean collapses to pressureFactor×radius
// = planet_term. Confirmed exact across Promitor/Beanironia/Odysseus (pressure 0.69–29.6, radius 7.7k–21.1k km).
// Any single landing rolls within ~±15% of this mean. radius in km, pressure in atm, result in km.
function landingDistKm(radiusKm, pressureAtm) {
    const pressureFactor = 0.15 + 0.45 * Math.pow(Math.max(pressureAtm, 0.1), -0.301);
    return pressureFactor * radiusKm; // = planet_term. NB: the (20/3) from the per-roll law cancels the
                                      // mean-altitude 0.15×radius factor (20/3 × 0.15 = 1), so it is NOT applied here.
}

// Best-effort engine identification for Real Fleet ships (Swagger exposes no engine field):
// match total thrust to a single engine's base thrust. Multi-engine / ambiguous → undefined,
// and landingDistKm() then falls back to the standardEngine ratio.
function engineFromThrust(thrustN) {
  for (const c of Object.values(COMPONENT_DATA.engine)) if (c.thrust === thrustN) return c.name;
  return undefined;
}

// FTL radiation damage fraction (unshielded)
function radDmgRaw(parsecs) {
  return 0.000353 * parsecs;
}

// ── Damage model (Phase 5 — PHASE4_DAMAGE_SPEC.md §2) ─────────────────────────
// CHARGE damage: fixed constant per reactor type, keyed by ReactorPower (spec §2c).
const CHARGE_DMG = { 2000: 6.875e-6, 2400: 7.133e-5 };  // QCR / RCT; unknown → QCR default
const GATEWAY_DMG = 5.247e-5;   // fixed per gateway hop (spec §2e)

// Per-blueprint shielding factors for the 4 known real blueprints (spec §3c). Unknown
// blueprints default to BHP baseline (general 0, everything else 0).
const BLUEPRINT_SHIELDING = {
  'BP-IXZI-0433': { general: -0.10, heat: 0, whipple: 0, radiation: 0, gravity: 0 },
  'BP-HJQJ-2441': { general: 0.15,  heat: 0, whipple: 0, radiation: 0, gravity: 1.0 },
  'BP-NVGM-1171': { general: -0.10, heat: 0, whipple: 0, radiation: 0, gravity: 0 },
  'BP-JRAJ-3531': { general: -0.10, heat: 0, whipple: 0, radiation: 0, gravity: 0 },
};
// Per-component shielding factors (spec §3a). General is additive (hull plate + drones).
// Hull plates are picked in the hull selector; drones/other shields in the damage checkboxes.
const SHIELDING_FACTORS = {
  LHP: { general: -0.10 }, BHP: { general: 0.00 }, RHP: { general: 0.10 },
  HHP: { general: 0.15 },  AHP: { general: 0.30 },
  RDS: { general: 0.05 },  RDL: { general: 0.10 },
  BPT: { heat: 0.50 },     APT: { heat: 1.00 },
  BWH: { whipple: 0.50 },  AWH: { whipple: 1.00 },
  STS: { gravity: 1.00 },
  BRP: { radiation: 0.15 }, ARP: { radiation: 0.35 }, SRP: { radiation: 0.70 },
};
const ZERO_SHIELD = { general: 0, heat: 0, whipple: 0, radiation: 0, gravity: 0 };

// Resolve the {general,heat,whipple,radiation,gravity} shielding factors for a ship.
// Hypothetical ships carry a precomputed .shielding (from the component selector);
// real ships map BlueprintNaturalId → BLUEPRINT_SHIELDING.
function shieldingFor(ship) {
  if (!ship) return ZERO_SHIELD;
  if (ship.source === 'hypo') return ship.shielding || ZERO_SHIELD;
  return BLUEPRINT_SHIELDING[ship.blueprintId] || ZERO_SHIELD;
}

// Reduce a base damage fraction by a shielding factor: damage × (1 − factor) (spec §3).
function applyShield(base, factor) {
  return base * (1 - (factor || 0));
}

function fmtDmg(frac) {
  return (frac * 100).toFixed(3) + '%';
}

// Full km with thousands separators, matching the in-game readout (no M/B rounding).
function fmtDist(km) {
  return `${Math.round(km).toLocaleString('en-US')} km`;
}

// ── Data ─────────────────────────────────────────────────────────────────────

let _loaded = false;
let _systems = {};       // SystemId → system object
let _sysByKey = {};      // uppercase name/NatId → SystemId
let _graph = {};         // SystemId → [SystemId]
let _gatewayEdges = new Set();
let _planets = {};       // PlanetNaturalId → planet object
let _planetByKey = {};   // uppercase NatId/name → PlanetNaturalId
let _sysStats = {};      // SystemId → { meteoroidDensity, luminosity }
let _sysGM = {};         // SystemId → GM (m³/s²) = G × star_mass_kg
let _ephemeris = {};     // PlanetNaturalId → [e, n, M0, peri, p_km, ux, uy, uz, wx, wy, wz]
let _reductionSurface = null; // { NE, NA, grid } bilinear lookup for isReduced STL arc
let _stationData = {};       // naturalId → station orbital params
let _stationsBySys = {};     // sysId → station entry
let _searchItems = [];   // { label, code, value, sysId, type }

let _ships = [];         // loaded from Swagger API
let _currentShip = null; // active ship spec (real selection OR hypothetical build)
let _mode = 'real';      // 'real' | 'hypo'
let _itemWeight = {};    // Ticker → Weight (t/unit) from material_data.json

let _origin = null;      // { planetId, sysId }
let _dest   = null;

async function loadData() {
  if (_loaded) return;
  const [univRaw, planetRaw, starsRaw, gatewaysRaw, materialRaw, ephRaw, redSurf, stationRaw] = await Promise.all([
    fetch('/prun_universe_data.json').then(r => r.json()),
    fetch('/planet_data.json').then(r => r.json()),
    fetch('/systemstars.json').then(r => r.json()),
    fetch('/gateways.json').then(r => r.json()),
    fetch('/material_data.json').then(r => r.json()),
    fetch('/ephemeris.json').then(r => r.json()),
    fetch('/insystem_reduction_surface.json').then(r => r.json()),
    fetch('/station_data.json').then(r => r.json()),
  ]);
  _reductionSurface = redSurf;

  materialRaw.forEach(m => { if (m.Ticker && m.Weight) _itemWeight[m.Ticker] = m.Weight; });

  // Systems
  univRaw.forEach(s => {
    _systems[s.SystemId] = s;
    const key = s.NaturalId.toUpperCase();
    _sysByKey[key] = s.SystemId;
    if (s.Name && s.Name !== s.NaturalId) _sysByKey[s.Name.toUpperCase()] = s.SystemId;
    _graph[s.SystemId] = (s.Connections || []).map(c => c.ConnectingId);
  });

  // Gateways
  gatewaysRaw.forEach(g => {
    const sk = g.source.slice(0, -1).toUpperCase();
    const tk = g.target.slice(0, -1).toUpperCase();
    const sId = _sysByKey[sk], tId = _sysByKey[tk];
    if (sId && tId && !_graph[sId].includes(tId)) {
      _graph[sId].push(tId);
      _gatewayEdges.add(sId + '→' + tId);
    }
  });

  // System hazard stats + GM from star mass (G × mass_kg, real SI)
  const G_SI = 6.6743e-11;
  starsRaw.forEach(s => {
    _sysStats[s.SystemId] = { meteoroidDensity: s.MeteoroidDensity || 0, luminosity: s.Luminosity || 0, type: s.Type || '' };
    if (s.Mass) _sysGM[s.SystemId] = G_SI * s.Mass;
  });

  // Ephemeris (Marcus's fitted orbital parameters, all 4199 planets)
  _ephemeris = ephRaw;

  // Station orbital data
  _stationData = stationRaw;
  Object.values(stationRaw).forEach(st => { _stationsBySys[st.sysId] = st; });

  // Planets (surface only for TO/LDG)
  planetRaw.forEach(p => {
    _planets[p.PlanetNaturalId] = p;
    const pk = p.PlanetNaturalId.toUpperCase();
    _planetByKey[pk] = p.PlanetNaturalId;
    if (p.PlanetName && p.PlanetName !== p.PlanetNaturalId) {
      _planetByKey[p.PlanetName.toUpperCase()] = p.PlanetNaturalId;
    }
  });

  // Build search index — one entry per entity, planets before systems.
  // Each entry has a searchable `sub` field (NatId for named entities) so both
  // name and NatId match in a single result, avoiding the duplicate-entry cutoff.

  // Surface planets (one entry each)
  planetRaw.filter(p => p.Surface).forEach(p => {
    const sys = _systems[p.SystemId];
    const sysName = sys ? (sys.Name !== sys.NaturalId ? sys.Name : sys.NaturalId) : '';
    const hasName = p.PlanetName && p.PlanetName !== p.PlanetNaturalId;
    _searchItems.push({
      label:    hasName ? p.PlanetName : p.PlanetNaturalId,
      sub:      hasName ? p.PlanetNaturalId : '',
      code:     hasName ? p.PlanetNaturalId : sysName,
      selLabel: hasName ? p.PlanetName : p.PlanetNaturalId,
      value:    'pl:' + p.PlanetNaturalId,
      sysId:    p.SystemId,
      type:     'planet'
    });
  });

  // Systems (one entry each)
  univRaw.forEach(s => {
    const hasName = s.Name && s.Name !== s.NaturalId;
    _searchItems.push({
      label:    hasName ? s.Name : s.NaturalId,
      sub:      hasName ? s.NaturalId : '',
      code:     hasName ? s.NaturalId : (s.Type + ' star'),
      selLabel: (hasName ? s.Name : s.NaturalId) + ' (system)',
      value:    'sys:' + s.SystemId,
      sysId:    s.SystemId,
      type:     'system'
    });
  });

  _loaded = true;
}

// ── Search dropdowns ─────────────────────────────────────────────────────────

function filterDrop(which) {
  const inputEl = document.getElementById(which + 'Input');
  const dropEl  = document.getElementById(which + 'Drop');
  const q = inputEl.value.trim().toLowerCase();

  if (!_loaded) {
    loadData().then(() => filterDrop(which));
    return;
  }

  const matches = q.length === 0 ? [] : _searchItems.filter(item =>
    item.label.toLowerCase().includes(q) ||
    (item.sub && item.sub.toLowerCase().includes(q)) ||
    (item.type === 'system' && item.code.toLowerCase().includes(q))
  ).slice(0, 14);

  if (matches.length === 0) { dropEl.style.display = 'none'; return; }

  dropEl.innerHTML = matches.map(item => `
    <div class="drop-item" data-value="${escHtml(item.value)}" data-label="${escHtml(item.selLabel)}">
      <span class="drop-name">${escHtml(item.label)}${item.sub ? ` <span class="drop-sys">${escHtml(item.sub)}</span>` : ''}</span>
      <span class="drop-code">${escHtml(item.code)}</span>
    </div>`).join('');
  dropEl.style.display = 'block';

  dropEl.querySelectorAll('.drop-item').forEach(el => {
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      selectDrop(which, el.dataset.value, el.dataset.label);
    });
  });
}

function selectDrop(which, value, label) {
  const inputEl = document.getElementById(which + 'Input');
  const dropEl  = document.getElementById(which + 'Drop');
  inputEl.value = label;
  dropEl.style.display = 'none';

  const resolved = resolveValue(value);
  if (which === 'origin') {
    _origin = resolved;
    inputEl.className = 'search-input ' + (resolved ? 'resolved' : 'unresolved');
  } else {
    _dest = resolved;
    inputEl.className = 'search-input ' + (resolved ? 'resolved' : 'unresolved');
  }
  updateFuelSlider();
}

function resolveValue(value) {
  if (!value) return null;
  if (value.startsWith('pl:')) {
    const pid = value.slice(3);
    const p = _planets[pid];
    return p ? { planetId: pid, sysId: p.SystemId } : null;
  }
  if (value.startsWith('sys:')) {
    const sysId = value.slice(4);
    return { planetId: null, sysId };
  }
  return null;
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) {
    document.querySelectorAll('.search-drop').forEach(d => d.style.display = 'none');
  }
});

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Ships ─────────────────────────────────────────────────────────────────────

async function loadShips() {
  const key  = document.getElementById('fioKey').value.trim()  || localStorage.getItem(FIO_KEY)  || '';
  const user = document.getElementById('fioUser').value.trim() || localStorage.getItem(FIO_USER) || '';
  const dot = document.getElementById('shipDot');
  if (key)  localStorage.setItem(FIO_KEY, key);
  if (user) localStorage.setItem(FIO_USER, user);

  dot.className = 'status-dot';
  if (!key) { dot.className = 'status-dot err'; return; }   // no key configured — nothing to load

  // Storage lookup needs the FIO username; skip it (non-fatal) if the user hasn't set one.
  const storageUrl = user
    ? `https://api.fnar.net/storage?username=${encodeURIComponent(user)}&include_ship_stl_stores=true&include_ship_ftl_stores=true&include_items=true`
    : null;
  try {
    const hdr = { headers: { Authorization: `FIOAPIKey ${key}` } };
    // /ships and /storage in parallel. Storage failure is non-fatal — ships still load.
    const [shipsRes, storeRes] = await Promise.all([
      fetch(SWAGGER_SHIPS, hdr),
      storageUrl ? fetch(storageUrl, hdr).catch(() => null) : Promise.resolve(null),
    ]);
    if (!shipsRes.ok) throw new Error('HTTP ' + shipsRes.status);
    const json = await shipsRes.json();

    // Build StorageId → { load, cap } from ship STL/FTL fuel stores (WeightLoad = fuel mass).
    const storeMap = {};
    if (storeRes && storeRes.ok) {
      const sj = await storeRes.json();
      const su = sj.UserNameToData || {};
      for (const u of Object.keys(su)) {
        for (const st of (su[u].Data || [])) {
          storeMap[st.StorageId] = { load: st.WeightLoad, cap: st.WeightCapacity };
        }
      }
    }

    // Response shape: UserNameToData.<user>.Data[]. Flatten all users (usually just the owner).
    const users = json.UserNameToData || {};
    const data = [];
    for (const u of Object.keys(users)) {
      for (const s of (users[u].Data || [])) data.push({ ...s, _user: u });
    }
    if (!data.length) throw new Error('no ships in response');

    _ships = data.map(s => {
      const stlStore = storeMap[s.STLFuelStoreId];  // match ship's STL store → fuel mass
      const ftlStore = storeMap[s.FTLFuelStoreId];  // match ship's FTL store → fuel mass
      return {
        source:             'real',
        registration:       s.Registration,
        name:               s.Name || s.Registration,
        blueprintId:        s.BlueprintNaturalId,
        location:           s.CurrentLocationNaturalId || s.CurrentLocationName || '',
        inFlight:           !!s.FlightId,
        condition:          s.Condition ?? 1,
        thrust:             s.Thrust,               // Newtons
        engineType:         engineFromThrust(s.Thrust),  // best-effort; drives landingDistKm() per-engine ratio
        acceleration:       s.Acceleration,         // Thrust[N] / Mass[t] snapshot (game units)
        operatingEmptyMass: s.OperatingEmptyMass,   // empty mass, TONNES
        loadedMass:         s.Mass,                 // current loaded mass, TONNES (empty + fuel + cargo)
        volume:             s.Volume,               // m³
        reactorPower:       s.ReactorPower,
        chargeFactor:       s.ChargeFactor,         // often null in Swagger; FTL_REACTORS covers known reactors
        emitterPower:       s.EmitterPower,
        stlFlowRate:        s.STLFuelFlowRate,      // t of STL fuel per unit M (Fix 1)
        maxGFactor:         null,                   // API has no component loadout → no G-cap known (no-op for this fleet)
        stlFuelLoad:        stlStore ? stlStore.load : null,  // actual onboard STL fuel mass (WeightLoad)
        stlFuelCap:         stlStore ? stlStore.cap  : null,  // STL tank WeightCapacity → slider max
        ftlFuelLoad:        ftlStore ? ftlStore.load : null,  // actual onboard FTL fuel mass (WeightLoad)
        ftlFuelCap:         ftlStore ? ftlStore.cap  : null,  // FTL tank WeightCapacity → slider max
      };
    });
    const sel = document.getElementById('shipSelect');
    sel.innerHTML = '<option value="">— select ship —</option>' +
      _ships.map((s, i) => `<option value="${i}">${s.registration}${s.name !== s.registration ? ' – ' + s.name : ''} [${s.blueprintId || '?'}]${s.inFlight ? ' ✈' : ''}</option>`).join('');
    dot.className = 'status-dot ok';
  } catch (err) {
    dot.className = 'status-dot err';
    alert('Failed to load fleet: ' + err);
  }
}

function onShipChange() {
  const idx = document.getElementById('shipSelect').value;
  _currentShip = idx !== '' ? _ships[+idx] : null;
  const s = _currentShip;
  if (s && s.loadedMass != null) {
    const delta = Math.max(0, s.loadedMass - s.operatingEmptyMass);
    let stlT, ftlT;  // fuel MASS (tonnes) for the cargo remainder computation
    if (s.stlFuelLoad != null || s.ftlFuelLoad != null) {
      // Real onboard fuel from /storage (WeightLoad, tonnes). Slider max = WeightCapacity.
      stlT = s.stlFuelLoad ?? 0;
      ftlT = s.ftlFuelLoad ?? 0;
      setSliderMax('stlMassSlider', Math.max(1, Math.round((s.stlFuelCap ?? stlT) / STL_UNIT_MASS)));
      setSliderMax('ftlMassSlider', Math.max(1, Math.round((s.ftlFuelCap ?? ftlT) / FTL_UNIT_MASS)));
    } else {
      // Fallback when storage data is unavailable — heuristic split.
      stlT = Math.min(delta, 12);
      ftlT = Math.min(Math.max(delta - stlT, 0), 3);
    }
    // Sliders display UNITS (mass / unit-mass); cargo remainder stays in tonnes.
    setSlider('stlMassSlider', 'stlMassVal', Math.round(stlT / STL_UNIT_MASS), 'u', 0);
    setSlider('ftlMassSlider', 'ftlMassVal', Math.round(ftlT / FTL_UNIT_MASS), 'u', 0);
    // Cargo = Mass − OperatingEmptyMass − STL WeightLoad − FTL WeightLoad.
    const cargo = Math.max(0, delta - stlT - ftlT);
    setSliderMax('cargoMassSlider', Math.max(5000, Math.ceil(cargo * 1.5)));
    setSlider('cargoMassSlider', 'cargoMassVal', cargo, 't', 0);
  }
  renderShipMeta();
  updateFuelSlider();
  onLoadoutChange();
}

function setMode(mode) {
  _mode = mode;

  document.getElementById('modeHypo').classList.toggle('active', mode === 'hypo');

// ── Hypothetical build ─────────────────────────────────────────────────────────

function buildComponentSelectors() {
  const wrap = document.getElementById('componentSelectors');
  const opt = (tick, c) => `<option value="${tick}">${tick} · ${c.name}</option>`;
  const row = (id, label, cat, noneOk, qty) => {
    const opts = (noneOk ? '<option value="">— none —</option>' : '') +
      Object.entries(COMPONENT_DATA[cat]).map(([t, c]) => opt(t, c)).join('');
    const qtyHtml = qty ? `<input id="${id}Qty" class="comp-qty" type="number" min="0" value="1" oninput="rebuildHypo()">` : '<span></span>';
    return `<div class="comp-row"><span class="comp-lbl">${label}</span>
      <select id="${id}" class="comp-sel" onchange="rebuildHypo()">${opts}</select>${qtyHtml}</div>`;
  };
  const dmg = Object.entries(COMPONENT_DATA.damage)
    .map(([t, c]) => `<label title="${c.name} · ${c.mass}t"><input type="checkbox" class="dmg-cb" value="${t}" onchange="rebuildHypo()">${t}</label>`).join('');
  wrap.innerHTML =
    row('hullSel',   'Hull',    'hull',      false, false) +
    row('engSel',    'Engine',  'engine',    false, true ) +
    row('stlTkSel',  'STL tank','stlTank',   true,  true ) +
    row('reactorSel','Reactor', 'ftlReactor',true,  false) +
    row('ftlTkSel',  'FTL tank','ftlTank',   true,  true ) +
    row('cargoSel',  'Cargo',   'cargo',     true,  true ) +
    row('seatSel',   'Seats',   'seat',      true,  false) +
    `<div class="comp-lbl" style="margin-top:6px">Damage / repair</div><div class="comp-dmg">${dmg}</div>`;
  // Sensible defaults: basic hull + standard engine
  document.getElementById('hullSel').value = 'BHP';
  document.getElementById('engSel').value  = 'ENG';
}

function rebuildHypo() {
  const qty = id => { const el = document.getElementById(id); return el ? Math.max(0, +el.value || 0) : 0; };
  const val = id => document.getElementById(id)?.value || '';
  const C = COMPONENT_DATA;

  const hull = C.hull[val('hullSel')];
  const eng  = C.engine[val('engSel')];
  const engQty = qty('engSelQty');
  if (!hull || !eng) { _currentShip = null; document.getElementById('hypoMeta').innerHTML = 'Select at least a hull and engine.'; updateFuelSlider(); onLoadoutChange(); return; }

  let mass = hull.mass;
  mass += eng.mass * engQty;
  const add = (cat, sel, q) => { const c = C[cat][val(sel)]; if (c) mass += c.mass * q; };
  add('stlTank',   'stlTkSel',  qty('stlTkSelQty'));
  add('ftlTank',   'ftlTkSel',  qty('ftlTkSelQty'));
  add('cargo',     'cargoSel',  qty('cargoSelQty'));
  const seat = C.seat[val('seatSel')];
  if (seat) mass += seat.mass;
  document.querySelectorAll('.dmg-cb:checked').forEach(cb => { mass += C.damage[cb.value].mass; });

  const reactor = C.ftlReactor[val('reactorSel')];
  const cargoC = C.cargo[val('cargoSel')];
  const cargoCap = cargoC ? cargoC.capT * qty('cargoSelQty') : 0;

  // Shielding: general = hull plate + drones (additive); heat/whipple/radiation/gravity
  // from the checked damage components (spec §3a).
  const sh = { general: SHIELDING_FACTORS[val('hullSel')]?.general || 0, heat: 0, whipple: 0, radiation: 0, gravity: 0 };
  document.querySelectorAll('.dmg-cb:checked').forEach(cb => {
    const f = SHIELDING_FACTORS[cb.value] || {};
    for (const k of ['general', 'heat', 'whipple', 'radiation', 'gravity']) if (f[k]) sh[k] += f[k];
  });

  _currentShip = {
    source: 'hypo',
    label: `${val('hullSel')}+${engQty}×${val('engSel')}`,
    blueprintId: 'HYPOTHETICAL',
    condition: 1,
    engineType: eng.name,             // e.g. 'standardEngine' → drives landingDistKm() per-engine ratio
    thrust: eng.thrust * engQty,
    operatingEmptyMass: mass,
    maxGFactor: hull.maxGFactor + (seat ? seat.gBonus : 0),
    reactorPower: reactor ? REACTOR_POWER[val('reactorSel')] : null,
    chargeFactor: null,
    stlFlowRate: 0.0075,   // nominal; only used by Fix 1 fuel-starve guard
    cargoCap,
    shielding: sh,
  };
  // Bound the cargo slider by the selected bay capacity (tonnes ceiling).
  setSliderMax('cargoMassSlider', Math.max(1, cargoCap || 5000));
  const cur = +document.getElementById('cargoMassSlider').value;
  if (cargoCap && cur > cargoCap) setSlider('cargoMassSlider', 'cargoMassVal', cargoCap, 't', 0);

  renderHypoMeta();
  updateFuelSlider();
  onLoadoutChange();
}

  `;
