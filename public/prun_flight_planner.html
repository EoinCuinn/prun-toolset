<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrUn Flight Planner</title>
<style>
  :root {
    --bg: #0f1117; --bg2: #181c27; --bg3: #1e2333;
    --border: #2a3045; --text: #e2e8f0; --text2: #8892a4; --text3: #555f72;
    --accent: #4f8ef7; --green: #4ade80; --orange: #fb923c; --red: #f87171;
    --yellow: #facc15; --mono: 'Courier New', monospace; --radius: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; padding: 1.5rem; min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }

  /* ── Header ── */
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .header h1 { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text2); display: flex; align-items: center; gap: 8px; }
  .header h1::before { content: ''; display: inline-block; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
  .key-input { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text2); padding: 5px 10px; font-size: 12px; font-family: var(--mono); width: 260px; }
  .key-input::placeholder { color: var(--text3); }
  .btn-sm { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text2); padding: 5px 14px; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); }
  .status-dot.ok { background: var(--green); }
  .status-dot.err { background: var(--red); }

  /* ── Layout ── */
  .planner { display: grid; grid-template-columns: 300px 1fr; gap: 1.25rem; align-items: start; }
  @media (max-width: 760px) { .planner { grid-template-columns: 1fr; } }

  /* ── Panels ── */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
  .card + .card { margin-top: 0.75rem; }
  .card-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 0.75rem; }

  /* ── Searchable input ── */
  .search-wrap { position: relative; }
  .search-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 6px 10px; font-size: 12px; outline: none; transition: border-color 0.15s; }
  .search-input:focus { border-color: var(--accent); }
  .search-input.resolved { border-color: #2d5a2d; color: var(--green); }
  .search-input.unresolved { border-color: #5a2d2d; color: var(--red); }
  .search-drop { position: absolute; top: calc(100% + 3px); left: 0; right: 0; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); max-height: 220px; overflow-y: auto; z-index: 100; display: none; }
  .drop-item { padding: 6px 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
  .drop-item:hover { background: var(--bg2); }
  .drop-item .drop-code { color: var(--text3); font-family: var(--mono); font-size: 11px; }
  .drop-item .drop-name { color: var(--text); }
  .drop-item .drop-sys  { color: var(--text2); font-size: 11px; }

  /* ── Route arrows ── */
  .route-row { display: flex; align-items: center; gap: 8px; margin-bottom: 0.5rem; }
  .route-label { font-size: 10px; color: var(--text3); font-family: var(--mono); letter-spacing: 0.08em; width: 32px; flex-shrink: 0; }
  .route-arrow { color: var(--text3); font-size: 16px; text-align: center; padding: 4px 0; }

  /* ── Fuel slider ── */
  .fuel-row { display: flex; align-items: center; gap: 10px; }
  .fuel-slider { flex: 1; accent-color: var(--accent); }
  .fuel-val { font-family: var(--mono); font-size: 12px; color: var(--accent); min-width: 70px; text-align: right; }
  input[type=range] { cursor: pointer; }

  /* ── Ship select ── */
  .ship-select { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 6px 10px; font-size: 12px; outline: none; }
  .ship-meta { margin-top: 6px; font-size: 11px; color: var(--text3); line-height: 1.6; font-family: var(--mono); }
  .ship-meta span { color: var(--text2); }

  /* ── Calc button ── */
  .calc-btn { width: 100%; background: #1e3a5f; border: 1px solid var(--accent); border-radius: var(--radius); color: var(--accent); padding: 8px; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; margin-top: 0.5rem; }
  .calc-btn:hover { background: #26487a; }
  .calc-btn:disabled { opacity: 0.4; cursor: default; }

  /* ── Results ── */
  .results-empty { color: var(--text3); font-size: 12px; text-align: center; padding: 2rem; }
  .leg { margin-bottom: 0.75rem; }
  .leg-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .leg-type { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 1px 6px; border-radius: 3px; font-family: var(--mono); }
  .leg-type.to   { background: #1a2a1a; color: var(--green); }
  .leg-type.ftl  { background: #1a1a3a; color: var(--accent); }
  .leg-type.stl  { background: #2a1a1a; color: var(--orange); }
  .leg-type.ldg  { background: #1a2a1a; color: var(--green); }
  .leg-dest { color: var(--text2); font-size: 12px; }
  .leg-body { border-left: 2px solid var(--border); padding-left: 10px; margin-left: 4px; }
  .leg-stat { display: flex; justify-content: space-between; align-items: baseline; padding: 1px 0; }
  .leg-stat .k { color: var(--text3); font-size: 11px; }
  .leg-stat .v { color: var(--text); font-size: 12px; font-family: var(--mono); }
  .leg-stat .v.approx { color: var(--yellow); }
  .leg-dmg { color: var(--orange); }
  .leg-dmg.high { color: var(--red); }

  /* ── Divider / Total ── */
  .results-divider { border: none; border-top: 1px solid var(--border); margin: 0.75rem 0; }
  .total-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .total-row .k { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); }
  .total-row .v { font-family: var(--mono); font-size: 14px; color: var(--text); }
  .total-row .v.dmg { color: var(--orange); }
  .total-row .v.dmg.high { color: var(--red); }

  /* ── Hazard badges ── */
  .hz { display: inline-flex; gap: 4px; align-items: center; flex-wrap: wrap; margin-top: 3px; }
  .hz-badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 700; letter-spacing: 0.08em; }
  .hz-met   { background: #2a1f0d; color: var(--orange); }
  .hz-rad   { background: #1a2a2a; color: #5eead4; }
  .hz-heat  { background: #2a1515; color: var(--red); }
  .hz-grav  { background: #1a1a2a; color: var(--accent); }

  /* ── Warning note ── */
  .note { font-size: 11px; color: var(--text3); margin-top: 0.5rem; line-height: 1.5; }
  .note .hl { color: var(--yellow); }
</style>
</head>
<body>

<div class="header">
  <h1>Flight Planner</h1>
  <input id="fioKey" class="key-input" placeholder="FIO API key" autocomplete="off">
  <input id="fioUser" class="key-input" style="width:140px" placeholder="FIO username" autocomplete="off">
  <button class="btn-sm" onclick="loadShips()">Load Ships</button>
  <div id="shipDot" class="status-dot"></div>
</div>

<div class="planner">

  <!-- LEFT: inputs -->
  <div>
    <!-- Ship -->
    <div class="card">
      <div class="card-label">Ship</div>
      <select id="shipSelect" class="ship-select" onchange="onShipChange()">
        <option value="">— select ship —</option>
      </select>
      <div id="shipMeta" class="ship-meta"></div>
    </div>

    <!-- Route -->
    <div class="card">
      <div class="card-label">Route</div>
      <div class="route-row">
        <span class="route-label">FROM</span>
        <div class="search-wrap" style="flex:1">
          <input id="originInput" class="search-input" placeholder="Planet or system…" autocomplete="off" oninput="filterDrop('origin')" onfocus="filterDrop('origin')">
          <div id="originDrop" class="search-drop"></div>
        </div>
      </div>
      <div class="route-arrow">↓</div>
      <div class="route-row">
        <span class="route-label">TO</span>
        <div class="search-wrap" style="flex:1">
          <input id="destInput" class="search-input" placeholder="Planet or system…" autocomplete="off" oninput="filterDrop('dest')" onfocus="filterDrop('dest')">
          <div id="destDrop" class="search-drop"></div>
        </div>
      </div>
    </div>

    <!-- Fuel -->
    <div class="card" id="fuelCard">
      <div class="card-label">STL Fuel for leg</div>
      <div class="fuel-row">
        <input id="fuelSlider" class="fuel-slider" type="range" min="1" max="200" value="60" oninput="onFuelChange()">
        <span id="fuelVal" class="fuel-val">60 units</span>
      </div>
      <div id="fuelTime" class="note" style="margin-top:6px"></div>
    </div>

    <!-- FTL Reactor -->
    <div class="card">
      <div class="card-label">FTL Reactor (ρ)</div>
      <div class="fuel-row">
        <input id="rufSlider" class="fuel-slider" type="range" min="10" max="100" value="100" oninput="onRufChange()">
        <span id="rufVal" class="fuel-val">100%</span>
      </div>
      <div id="rufInfo" class="note" style="margin-top:6px"></div>
    </div>

    <!-- Calculate -->
    <button class="calc-btn" onclick="calculate()">Calculate Route</button>
  </div>

  <!-- RIGHT: results -->
  <div class="card" id="results">
    <div class="results-empty">Enter origin and destination to plan a route.</div>
  </div>

</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const FIO_BASE   = 'https://rest.fnar.net';
const FIO_KEY    = 'prun_apikey';
const FP_SCALE   = 12.0;     // coordinate units per parsec — paper §12.5: exactly 12

// FTL reactor physics — paper §12.1–12.3 and §13.5
// Jump time: t = A · e^(-β·ρ) · d_ftl  [seconds, per hop, d_ftl in parsecs]
// Charge:    t = c · ρ                  [seconds, between consecutive lane jumps]
// c = (3/8) · reactorPower / chargeFactor  (paper eq.24, exact)
// β = κ · reactorPower  (κ ≈ 4.4e-4, paper §13.5)
// A from emitter loadout — low-power reactors (≤2400): A≈2804; high-power (≥4800): A≈2362
// These values are paper estimates (±5%); calibrate against APEX for exact ship constants.
const FTL_REACTORS = {
  2000: { c: 75,  A: 2804, beta: 4.4e-4 * 2000 },  // Quick-Charge (P=2000, f=10)
  2400: { c: 450, A: 2804, beta: 4.4e-4 * 2400 },  // Standard     (P=2400, f=2)
  4800: { c: 120, A: 2362, beta: 4.4e-4 * 4800 },  // High-Power   (P=4800, f=15)
  7200: { c: 90,  A: 2362, beta: 4.4e-4 * 7200 },  // Hyper-Power  (P=7200, f=30)
};
// Gateway: t = d_ftl/3 hours + 1220s bracket (10+600+600+10) — paper §12.6 eq.19
// Independent of ship and reactor; speed exactly 3 pc/hour = 1200 s/pc.

// Orbital ephemeris — Josh Glass paper (June 2026), Section 10
// M₀=0 for ALL planets at worldTime=0 (hardcoded in APEX client bundle.js keplerian() call)
const REFERENCE_TIME_S = 1451690603; // 2016-01-01 23:23:23 UTC

// GM is computed at load time from star masses in systemstars.json:
// GM [m³/s²] = 6.6743e-11 × star_mass_kg   (real SI, no worldtime conversion needed)
// worldTime() running 20× faster automatically gives 20× orbital speed.
// Stored in _sysGM (SystemId → GM); populated in loadData().

// Calibrated hull physics — paper formula: t[real-s] = d/(2·accel·M) + 2·M
// accel in km/s² (real-s), M = stlFuelConsumption (integer speed-cap index = slider value)
// NOTE: FIO.Acceleration = thrust/operatingEmptyMass (max accel, empty ship).
// FIO.Mass is the ship VOLUME in m³ — NOT mass. Do not use it for accel calculations.
const HULL_PHYSICS = {
  // AVI-06CKD: 24-pt empirical calibration (FIO thrust/mass gives wrong unit ratio for this hull)
  'AVI-06CKD': { accel: 2076, mMin: 12, stlFuelMax: 112 },
  // BP-HJQJ-2441: calibrated from AVI-047P1 game export 2026-06-22 at ~97.65% condition.
  // FIO Mass=2662 t but APEX flight mass=1852 t — FIO.Mass is not the game flight mass.
  // Derived: 627402854 / (2×1257×3698) = 67.47 km/s². stlFuelMax from FIO stlCapacity.
  'BP-HJQJ-2441': { accel: 67.47, mMin: 1 },
};

// ── Orbital ephemeris ────────────────────────────────────────────────────────

function worldTime(unixT) {
  return REFERENCE_TIME_S + (unixT - REFERENCE_TIME_S) * 20;
}

function solveKepler(M_anom, ecc) {
  let E = M_anom;
  for (let i = 0; i < 50; i++) {
    const dE = (M_anom - E + ecc * Math.sin(E)) / (1 - ecc * Math.cos(E));
    E += dE;
    if (Math.abs(dE) < 1e-12) break;
  }
  return E;
}

function planetXY(unixT, a_m, ecc, GM_wt) {
  const wt  = worldTime(unixT);
  const n   = Math.sqrt(GM_wt / (a_m * a_m * a_m));
  const M_a = ((n * wt) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  const E   = solveKepler(M_a, ecc);
  return { x: a_m * (Math.cos(E) - ecc), y: a_m * Math.sqrt(1 - ecc * ecc) * Math.sin(E) };
}

// 3D position — OrbitRightAscension=0, OrbitPeriapsis=0 for all PrUn planets,
// so inclination is a simple tilt of the y component. inc in radians.
function planetXYZ(unixT, a_m, ecc, inc, GM_wt) {
  const wt    = worldTime(unixT);
  const n     = Math.sqrt(GM_wt / (a_m * a_m * a_m));
  const M_a   = ((n * wt) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  const E     = solveKepler(M_a, ecc);
  const x_orb = a_m * (Math.cos(E) - ecc);
  const y_orb = a_m * Math.sqrt(1 - ecc * ecc) * Math.sin(E);
  return { x: x_orb, y: y_orb * Math.cos(inc), z: y_orb * Math.sin(inc) };
}

// ── Carlson symmetric elliptic integrals (machine precision) ──────────────────

function carlsonRF(x, y, z) {
  let xi = x, yi = y, zi = z;
  let mu = (xi+yi+zi)/3;
  let dx = (mu-xi)/mu, dy = (mu-yi)/mu, dz = (mu-zi)/mu;
  for (let n = 0; n < 50; n++) {
    if (Math.max(Math.abs(dx), Math.abs(dy), Math.abs(dz)) <= 1e-10) break;
    const lam = Math.sqrt(xi*yi) + Math.sqrt(yi*zi) + Math.sqrt(zi*xi);
    xi = (xi+lam)/4; yi = (yi+lam)/4; zi = (zi+lam)/4;
    mu = (xi+yi+zi)/3;
    dx = (mu-xi)/mu; dy = (mu-yi)/mu; dz = (mu-zi)/mu;
  }
  const E2 = dx*dy - dz*dz, E3 = dx*dy*dz;
  return (1 - E2/10 + E3/14 + E2*E2/24 - 3*E2*E3/44) / Math.sqrt(mu);
}

function carlsonRD(x, y, z) {
  let xi = x, yi = y, zi = z, sum = 0, fac = 1;
  let mu = (xi+yi+3*zi)/5;
  let dx = (mu-xi)/mu, dy = (mu-yi)/mu, dz = (mu-zi)/mu;
  for (let n = 0; n < 50; n++) {
    if (Math.max(Math.abs(dx), Math.abs(dy), Math.abs(dz)) <= 1e-10) break;
    const lam = Math.sqrt(xi*yi) + Math.sqrt(yi*zi) + Math.sqrt(zi*xi);
    sum += fac / (Math.sqrt(zi) * (zi + lam));
    xi = (xi+lam)/4; yi = (yi+lam)/4; zi = (zi+lam)/4;
    fac *= 0.25;
    mu = (xi+yi+3*zi)/5;
    dx = (mu-xi)/mu; dy = (mu-yi)/mu; dz = (mu-zi)/mu;
  }
  const E2 = dx*dy - 6*dz*dz, E3 = dx*dy*dz;
  return 3*sum + fac*(1 - 3*E2/14 + E3/6 + 9*E2*E2/88 - 9*E2*E3/52)/(mu*Math.sqrt(mu));
}

// Incomplete elliptic integral E(ψ, m) — paper eq.10 integrand, Carlson form
function ellipticEIncomplete(psi, m) {
  if (psi === 0) return 0;
  const s = Math.sin(psi), c2 = Math.cos(psi) ** 2;
  const y = 1 - m * s * s;
  if (y <= 0) return s;
  return s * carlsonRF(c2, y, 1) - (m / 3) * s * s * s * carlsonRD(c2, y, 1);
}

// ── SLT charged distance — 3D focal ellipse + rank-one reduction ──────────────
// Inputs: departure O and arrival P in metres (3D Cartesian, star at origin).
// Returns { chargedKm, arcKm, isReduced } — chargedKm is what the game bills.
// Paper §8 (arc) + Scaffolding §16 (rank-one directional reduction surrogate).
function calculateSltDistance3D(Ox, Oy, Oz, Px, Py, Pz) {
  const rO = Math.hypot(Ox, Oy, Oz), rP = Math.hypot(Px, Py, Pz);
  if (!rO || !rP) return null;

  const a = (rO + rP) / 2;
  const dx = Px-Ox, dy = Py-Oy, dz = Pz-Oz;
  const u = Math.hypot(dx, dy, dz);
  if (u < 1) return { chargedKm: 0, arcKm: 0, isReduced: false };

  const uhx = dx/u, uhy = dy/u, uhz = dz/u;

  // Plane normal N = O × P (defines the transfer ellipse plane)
  const Nx = Oy*Pz - Oz*Py, Ny = Oz*Px - Ox*Pz, Nz = Ox*Py - Oy*Px;
  const Nmag = Math.hypot(Nx, Ny, Nz);
  if (Nmag < 1e-10) return null;
  const Nhx = Nx/Nmag, Nhy = Ny/Nmag, Nhz = Nz/Nmag;

  // In-plane perpendicular to chord: e2 = N_hat × u_hat
  const e2x = Nhy*uhz - Nhz*uhy;
  const e2y = Nhz*uhx - Nhx*uhz;
  const e2z = Nhx*uhy - Nhy*uhx;

  // Focal construction — second focus via focal-radius swap
  const s = (rP*rP - rO*rO + u*u) / (2*u);
  const h2 = rP*rP - s*s;
  if (h2 < 0) return null;
  const h = Math.sqrt(h2);

  // starCross > 0 means star is on the right of chord S→P; prograde O' goes LEFT (sign=+1).
  const starCross = -(Ox*e2x + Oy*e2y + Oz*e2z);
  const sign = starCross > 0 ? 1 : -1;

  const Fpx = Ox + s*uhx + sign*h*e2x;
  const Fpy = Oy + s*uhy + sign*h*e2y;
  const Fpz = Oz + s*uhz + sign*h*e2z;

  const Cx = Fpx/2, Cy = Fpy/2, Cz = Fpz/2;
  const c = Math.hypot(Cx, Cy, Cz);
  if (c >= a) return null;

  const m = Math.min((c/a)**2, 0.999999999);
  const b = a * Math.sqrt(1 - m);

  // Ellipse axes: major toward star (periapsis), minor = N_hat × major
  const cMag = c || 1;
  const majHx = -Cx/cMag, majHy = -Cy/cMag, majHz = -Cz/cMag;
  const minHx = Nhy*majHz - Nhz*majHy;
  const minHy = Nhz*majHx - Nhx*majHz;
  const minHz = Nhx*majHy - Nhy*majHx;

  // Eccentric anomalies via 3D dot-product projection
  const SOx = Ox-Cx, SOy = Oy-Cy, SOz = Oz-Cz;
  const POx = Px-Cx, POy = Py-Cy, POz = Pz-Cz;
  const E1 = Math.atan2((SOx*minHx+SOy*minHy+SOz*minHz)/b, (SOx*majHx+SOy*majHy+SOz*majHz)/a);
  const E2 = Math.atan2((POx*minHx+POy*minHy+POz*minHz)/b, (POx*majHx+POy*majHy+POz*majHz)/a);

  const deltaE = ((E2-E1+Math.PI) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI) - Math.PI;
  const psi = Math.abs(deltaE) / 2;

  const l = 2 * a * ellipticEIncomplete(psi, m);
  const e_transfer = Math.sqrt(m);

  if (deltaE >= 0) {
    console.log('SLT Math:', { e_transfer, psi, unreduced_l: l/1000, reduction_R: 0, final_dist: l/1000 });
    return { chargedKm: l/1000, arcKm: l/1000, isReduced: false };
  } else {
    const sin2p = Math.sin(2 * psi);
    const R = (1/3) * m * sin2p * sin2p;
    const reduction = 2 * a * R;
    const charged = Math.max(0, l - reduction);
    console.log('SLT Math:', { e_transfer, psi, unreduced_l: l/1000, reduction_R: R, final_dist: charged/1000 });
    return { chargedKm: charged/1000, arcKm: l/1000, isReduced: true };
  }
}

// Rendezvous solver — 3D positions, charged distance, converges in ~5 iterations.
// Returns { chargedKm, arcKm, tReal, isReduced } or null.
function stlRendezvous(pl1, pl2, GM, accel, M, nowUnix) {
  if (!GM || !accel || M <= 0 || !pl1?.OrbitSemiMajorAxis || !pl2?.OrbitSemiMajorAxis) return null;
  const inc1 = pl1.OrbitInclination || 0, inc2 = pl2.OrbitInclination || 0;
  const S = planetXYZ(nowUnix, pl1.OrbitSemiMajorAxis, pl1.OrbitEccentricity || 0, inc1, GM);
  let tFlight = 2 * M;
  for (let i = 0; i < 25; i++) {
    const P = planetXYZ(nowUnix + tFlight, pl2.OrbitSemiMajorAxis, pl2.OrbitEccentricity || 0, inc2, GM);
    const slt = calculateSltDistance3D(S.x, S.y, S.z, P.x, P.y, P.z);
    if (slt == null) return null;
    const newT = stlTimeReal(slt.chargedKm, M, accel);
    if (newT == null) return null;
    if (Math.abs(newT - tFlight) < 0.5) return { chargedKm: slt.chargedKm, arcKm: slt.arcKm, tReal: newT, isReduced: slt.isReduced };
    tFlight = newT;
  }
  return null;
}

function sysGM(sysId) {
  return _sysGM[sysId] ?? null;
}

// ── Physics ──────────────────────────────────────────────────────────────────

// Complete elliptic integral of second kind E(m), 8-point Gauss-Legendre
function ellipticE(m) {
  if (m <= 0) return Math.PI / 2;
  if (m >= 1) return 1;
  const x = [0.09501251,0.28160355,0.45801678,0.61787624,0.75540441,0.86563120,0.94457502,0.98940093];
  const w = [0.18945061,0.18260342,0.16915652,0.14959599,0.12462897,0.09515851,0.06225352,0.02715246];
  const h = Math.PI / 4;
  let s = 0;
  for (let i = 0; i < 8; i++) {
    const t1 = h * (1 + x[i]), t2 = h * (1 - x[i]);
    s += w[i] * (Math.sqrt(1 - m * Math.sin(t1) ** 2) + Math.sqrt(1 - m * Math.sin(t2) ** 2));
  }
  return h * s;
}

// Hohmann arc distance (km) from orbital radii (metres) — maximum STL distance (opposite-side)
function hohmannArcKm(rO_m, rP_m) {
  if (!rO_m || !rP_m || rO_m <= 0 || rP_m <= 0) return null;
  const at = (rO_m + rP_m) / 2;
  const et = Math.abs(rP_m - rO_m) / (rO_m + rP_m);
  return 2 * at * ellipticE(et * et) / 1000; // metres → km
}

// Chord (same-side) distance (km) — minimum STL distance
function chordKm(rO_m, rP_m) {
  if (!rO_m || !rP_m || rO_m <= 0 || rP_m <= 0) return null;
  return Math.abs(rP_m - rO_m) / 1000; // metres → km
}

// STL flight time [real-s] — Josh Glass paper formula (June 2026), Section 6
// t = d/(2·accel·M) + 2·M   (always trapezoidal — game never uses triangular profile)
function stlTimeReal(dKm, M, accel) {
  if (!dKm || !M || !accel || M <= 0) return null;
  return dKm / (2 * accel * M) + 2 * M;
}

// Real-seconds → human readable
function fmtRealTime(realSec) {
  const h = Math.floor(realSec / 3600);
  const m = Math.floor((realSec % 3600) / 60);
  const s = Math.floor(realSec % 60);
  if (h >= 24) {
    const d = Math.floor(h / 24), hr = h % 24;
    return `${d}d ${hr}h ${m}m`;
  }
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

// Minutes → human readable
function fmtMin(min) {
  if (min < 60) return `${Math.round(min)}m`;
  const h = Math.floor(min / 60), m = Math.round(min % 60);
  return m ? `${h}h ${m}m` : `${h}h`;
}

// Atmospheric leg (TO or landing) — paper Section 12.4, corrected in Section 1.2
// d_TO  = (R_m/1000) × (0.1482 + 0.4521·P^0.30)   frame km
// d_LDG = 926 × (R_m/1e6)^0.96 × (1+P)^(-0.42)   frame km  (decreases with pressure)
// M_atm = sqrt(d / (13.71 × accel_atm))            server-set speed tier (= stlFuelConsumption)
// t     = M × (13.71/2 + 2) = M × 8.855            real-s
function atmLeg(R_m, P, accel, which) {
  const accel_atm = accel / 350.11;
  const p = Math.max(0, P || 0);
  const d = (which === 'to')
    ? (R_m / 1000) * (0.1482 + 0.4521 * Math.pow(p, 0.30))
    : 926 * Math.pow(R_m / 1e6, 0.96) * Math.pow(1 + p, -0.42);
  const M = Math.sqrt(d / (13.71 * accel_atm));
  return { dKm: d, M: Math.round(M) || 1, tReal: M * 8.855 };
}

// FTL physics for a ship — returns { c, A, beta } or null
function ftlPhysics(ship) {
  if (!ship?.reactorPower) return null;
  const known = FTL_REACTORS[ship.reactorPower];
  if (known) return { ...known };
  // Unknown reactor power: estimate
  const A    = ship.reactorPower <= 2400 ? 2804 : 2362;
  const beta = 4.4e-4 * ship.reactorPower;
  const c    = (ship.chargeFactor > 0) ? (3/8 * ship.reactorPower / ship.chargeFactor) : null;
  return { c, A, beta, estimated: true };
}

// FTL parsec distance between two system objects
function parsecsBetween(a, b) {
  const dx = a.PositionX - b.PositionX;
  const dy = a.PositionY - b.PositionY;
  const dz = a.PositionZ - b.PositionZ;
  return Math.sqrt(dx * dx + dy * dy + dz * dz) / FP_SCALE;
}

// Meteor damage fraction (unshielded)
// Uses destination orbital radius as distance proxy, matching ship builder calibration
function meteorDmgRaw(destOrbitalRadiusM, density) {
  const distKm = destOrbitalRadiusM / 1000;
  return 2.5e-9 * distKm * Math.pow(Math.max(0.001, density), 0.625);
}

// FTL radiation damage fraction (unshielded)
function radDmgRaw(parsecs) {
  return 0.000353 * parsecs;
}

function fmtDmg(frac) {
  return (frac * 100).toFixed(3) + '%';
}

function fmtDist(km) {
  if (km >= 1e9) return `${(km / 1e9).toFixed(2)} B km`;
  if (km >= 1e6) return `${(km / 1e6).toFixed(0)} M km`;
  return `${Math.round(km).toLocaleString()} km`;
}

// ── Data ─────────────────────────────────────────────────────────────────────

let _loaded = false;
let _systems = {};       // SystemId → system object
let _sysByKey = {};      // uppercase name/NatId → SystemId
let _graph = {};         // SystemId → [SystemId]
let _gatewayEdges = new Set();
let _planets = {};       // PlanetNaturalId → planet object
let _planetByKey = {};   // uppercase NatId/name → PlanetNaturalId
let _sysStats = {};      // SystemId → { meteoroidDensity, luminosity }
let _sysGM = {};         // SystemId → GM (m³/s²) = G × star_mass_kg
let _searchItems = [];   // { label, code, value, sysId, type }

let _ships = [];         // loaded from FIO
let _currentShip = null;
let _itemWeight = {};    // Ticker → Weight (t/unit) from material_data.json

let _origin = null;      // { planetId, sysId }
let _dest   = null;

async function loadData() {
  if (_loaded) return;
  const [univRaw, planetRaw, starsRaw, gatewaysRaw, materialRaw] = await Promise.all([
    fetch('/prun_universe_data.json').then(r => r.json()),
    fetch('/planet_data.json').then(r => r.json()),
    fetch('/systemstars.json').then(r => r.json()),
    fetch('/gateways.json').then(r => r.json()),
    fetch('/material_data.json').then(r => r.json()),
  ]);

  materialRaw.forEach(m => { if (m.Ticker && m.Weight) _itemWeight[m.Ticker] = m.Weight; });

  // Systems
  univRaw.forEach(s => {
    _systems[s.SystemId] = s;
    const key = s.NaturalId.toUpperCase();
    _sysByKey[key] = s.SystemId;
    if (s.Name && s.Name !== s.NaturalId) _sysByKey[s.Name.toUpperCase()] = s.SystemId;
    _graph[s.SystemId] = (s.Connections || []).map(c => c.ConnectingId);
  });

  // Gateways
  gatewaysRaw.forEach(g => {
    const sk = g.source.slice(0, -1).toUpperCase();
    const tk = g.target.slice(0, -1).toUpperCase();
    const sId = _sysByKey[sk], tId = _sysByKey[tk];
    if (sId && tId && !_graph[sId].includes(tId)) {
      _graph[sId].push(tId);
      _gatewayEdges.add(sId + '→' + tId);
    }
  });

  // System hazard stats + GM from star mass (G × mass_kg, real SI)
  const G_SI = 6.6743e-11;
  starsRaw.forEach(s => {
    _sysStats[s.SystemId] = { meteoroidDensity: s.MeteoroidDensity || 0, luminosity: s.Luminosity || 0 };
    if (s.Mass) _sysGM[s.SystemId] = G_SI * s.Mass;
  });

  // Planets (surface only for TO/LDG)
  planetRaw.forEach(p => {
    _planets[p.PlanetNaturalId] = p;
    const pk = p.PlanetNaturalId.toUpperCase();
    _planetByKey[pk] = p.PlanetNaturalId;
    if (p.PlanetName && p.PlanetName !== p.PlanetNaturalId) {
      _planetByKey[p.PlanetName.toUpperCase()] = p.PlanetNaturalId;
    }
  });

  // Build search index — one entry per entity, planets before systems.
  // Each entry has a searchable `sub` field (NatId for named entities) so both
  // name and NatId match in a single result, avoiding the duplicate-entry cutoff.

  // Surface planets (one entry each)
  planetRaw.filter(p => p.Surface).forEach(p => {
    const sys = _systems[p.SystemId];
    const sysName = sys ? (sys.Name !== sys.NaturalId ? sys.Name : sys.NaturalId) : '';
    const hasName = p.PlanetName && p.PlanetName !== p.PlanetNaturalId;
    _searchItems.push({
      label:    hasName ? p.PlanetName : p.PlanetNaturalId,
      sub:      hasName ? p.PlanetNaturalId : '',
      code:     hasName ? p.PlanetNaturalId : sysName,
      selLabel: hasName ? p.PlanetName : p.PlanetNaturalId,
      value:    'pl:' + p.PlanetNaturalId,
      sysId:    p.SystemId,
      type:     'planet'
    });
  });

  // Systems (one entry each)
  univRaw.forEach(s => {
    const hasName = s.Name && s.Name !== s.NaturalId;
    _searchItems.push({
      label:    hasName ? s.Name : s.NaturalId,
      sub:      hasName ? s.NaturalId : '',
      code:     hasName ? s.NaturalId : (s.Type + ' star'),
      selLabel: (hasName ? s.Name : s.NaturalId) + ' (system)',
      value:    'sys:' + s.SystemId,
      sysId:    s.SystemId,
      type:     'system'
    });
  });

  _loaded = true;
}

// ── Search dropdowns ─────────────────────────────────────────────────────────

function filterDrop(which) {
  const inputEl = document.getElementById(which + 'Input');
  const dropEl  = document.getElementById(which + 'Drop');
  const q = inputEl.value.trim().toLowerCase();

  if (!_loaded) {
    loadData().then(() => filterDrop(which));
    return;
  }

  const matches = q.length === 0 ? [] : _searchItems.filter(item =>
    item.label.toLowerCase().includes(q) ||
    (item.sub && item.sub.toLowerCase().includes(q)) ||
    (item.type === 'system' && item.code.toLowerCase().includes(q))
  ).slice(0, 14);

  if (matches.length === 0) { dropEl.style.display = 'none'; return; }

  dropEl.innerHTML = matches.map(item => `
    <div class="drop-item" data-value="${escHtml(item.value)}" data-label="${escHtml(item.selLabel)}">
      <span class="drop-name">${escHtml(item.label)}${item.sub ? ` <span class="drop-sys">${escHtml(item.sub)}</span>` : ''}</span>
      <span class="drop-code">${escHtml(item.code)}</span>
    </div>`).join('');
  dropEl.style.display = 'block';

  dropEl.querySelectorAll('.drop-item').forEach(el => {
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      selectDrop(which, el.dataset.value, el.dataset.label);
    });
  });
}

function selectDrop(which, value, label) {
  const inputEl = document.getElementById(which + 'Input');
  const dropEl  = document.getElementById(which + 'Drop');
  inputEl.value = label;
  dropEl.style.display = 'none';

  const resolved = resolveValue(value);
  if (which === 'origin') {
    _origin = resolved;
    inputEl.className = 'search-input ' + (resolved ? 'resolved' : 'unresolved');
  } else {
    _dest = resolved;
    inputEl.className = 'search-input ' + (resolved ? 'resolved' : 'unresolved');
  }
  updateFuelSlider();
}

function resolveValue(value) {
  if (!value) return null;
  if (value.startsWith('pl:')) {
    const pid = value.slice(3);
    const p = _planets[pid];
    return p ? { planetId: pid, sysId: p.SystemId } : null;
  }
  if (value.startsWith('sys:')) {
    const sysId = value.slice(4);
    return { planetId: null, sysId };
  }
  return null;
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) {
    document.querySelectorAll('.search-drop').forEach(d => d.style.display = 'none');
  }
});

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Ships ─────────────────────────────────────────────────────────────────────

async function loadShips() {
  const key  = document.getElementById('fioKey').value.trim() || localStorage.getItem(FIO_KEY) || '';
  const user = document.getElementById('fioUser').value.trim();
  const dot  = document.getElementById('shipDot');

  if (key) localStorage.setItem(FIO_KEY, key);
  if (!key || !user) { alert('Enter FIO key and username.'); return; }

  dot.className = 'status-dot';
  try {
    const [shipsRes, fuelRes] = await Promise.all([
      fetch(`${FIO_BASE}/ship/ships/${user}`,      { headers: { Authorization: key } }),
      fetch(`${FIO_BASE}/ship/ships/fuel/${user}`, { headers: { Authorization: key } }),
    ]);
    if (!shipsRes.ok) throw new Error(shipsRes.status);
    const data     = await shipsRes.json();
    const fuelData = fuelRes.ok ? await fuelRes.json() : [];

    const sfWeight = _itemWeight['SF'];
    const stlCapMap = {};
    for (const store of fuelData) {
      if (store.Type === 'STL_FUEL_STORE' && store.WeightCapacity && sfWeight) {
        stlCapMap[store.StorageId] = Math.round(store.WeightCapacity / sfWeight);
      }
    }

    _ships = data.map(s => ({
      registration:       s.Registration,
      name:               s.Name || s.Registration,
      blueprintId:        s.BlueprintNaturalId,
      condition:          s.Condition ?? 1,
      thrust:             s.Thrust,
      acceleration:       s.Acceleration,       // max accel at empty mass (km/s²-equivalent, game units)
      operatingEmptyMass: s.OperatingEmptyMass, // empty hull mass in tonnes (APEX "Empty mass")
      reactorPower:       s.ReactorPower,
      chargeFactor:       s.ChargeFactor,
      emitterPower:       s.EmitterPower,
      stlFlowRate:        s.StlFuelFlowRate,
      stlCapacity:        stlCapMap[s.StlFuelStoreId] || s.StlFuelCapacity || 0,
      ftlCapacity:        s.FtlFuelCapacity,
    }));
    const sel = document.getElementById('shipSelect');
    sel.innerHTML = '<option value="">— select ship —</option>' +
      _ships.map((s, i) => `<option value="${i}">${s.registration}${s.name !== s.registration ? ' – ' + s.name : ''} [${s.blueprintId || '?'}]</option>`).join('');
    dot.className = 'status-dot ok';
  } catch (err) {
    dot.className = 'status-dot err';
    alert('Failed to load ships: ' + err);
  }
}

function onShipChange() {
  const idx = document.getElementById('shipSelect').value;
  _currentShip = idx !== '' ? _ships[+idx] : null;
  renderShipMeta();
  updateFuelSlider();
}

function onRufChange() {
  const ruf = +document.getElementById('rufSlider').value / 100;
  document.getElementById('rufVal').textContent = Math.round(ruf * 100) + '%';
  const ftl = ftlPhysics(_currentShip);
  const infoEl = document.getElementById('rufInfo');
  if (!_currentShip) { infoEl.innerHTML = '— select ship'; return; }
  if (!ftl) { infoEl.innerHTML = '— reactor stats unavailable'; return; }
  const chargeParts = [];
  if (ftl.c != null) chargeParts.push(`charge ${fmtRealTime(ftl.c * ruf)}/jump`);
  const J = ftl.A * Math.exp(-ftl.beta * ruf);
  chargeParts.push(`${(3600 / J).toFixed(2)} pc/hr jump speed`);
  infoEl.innerHTML = chargeParts.join(' &nbsp;·&nbsp; ') + (ftl.estimated ? ' <span style="color:var(--yellow)">(est)</span>' : '');
}

function renderShipMeta() {
  const el = document.getElementById('shipMeta');
  if (!_currentShip) { el.innerHTML = ''; return; }
  const s = _currentShip;
  const phys = shipPhysics(s);
  const ftl  = ftlPhysics(s);
  el.innerHTML = `
    <span>Hull:</span> ${s.blueprintId || '?'} &nbsp;
    <span>Cond:</span> ${Math.round((s.condition || 1) * 100)}%<br>
    ${s.thrust             ? `<span>Thrust:</span> ${s.thrust} &nbsp;` : ''}
    ${s.operatingEmptyMass ? `<span>Empty mass:</span> ${s.operatingEmptyMass.toFixed(0)}t &nbsp;` : ''}
    ${s.stlFlowRate        ? `<span>STL flow:</span> ${s.stlFlowRate}` : ''}
    ${phys ? `<br><span>accel:</span> ${phys.accel.toFixed(1)} km/s²${phys.theoretical ? ' <span style="color:var(--yellow)">(uncal)</span>' : ''}` : ''}
    ${ftl  ? `<br><span>reactor P:</span> ${s.reactorPower}${ftl.c != null ? ` &nbsp;<span>c:</span> ${ftl.c}s` : ''}${ftl.estimated ? ' <span style="color:var(--yellow)">(est)</span>' : ''}` : ''}
  `;
  onRufChange();
}

function shipPhysics(ship, M = 0) {
  if (!ship) return null;
  const cal = HULL_PHYSICS[ship.blueprintId];
  if (cal) return { stlFuelMax: ship.stlCapacity || 200, mMin: 1, ...cal };
  // FIO Acceleration = thrust/operatingEmptyMass (empty-ship max).
  // Correct for fuel mass: accel × (emptyMass / (emptyMass + M × sfWeight)).
  if (ship.acceleration) {
    const sfW = _itemWeight['SF'] || 0;
    const accel = (M > 0 && ship.operatingEmptyMass && sfW)
      ? ship.acceleration * (ship.operatingEmptyMass / (ship.operatingEmptyMass + M * sfW))
      : ship.acceleration;
    return { accel, stlFuelMax: ship.stlCapacity || 200, mMin: 1, theoretical: true };
  }
  return null;
}

// ── Fuel slider ───────────────────────────────────────────────────────────────

function updateFuelSlider() {
  const phys = shipPhysics(_currentShip);
  const slider = document.getElementById('fuelSlider');
  if (phys) {
    slider.min  = phys.mMin || 1;
    slider.max  = phys.stlFuelMax ?? 200;
    slider.step = 1;
  }
  onFuelChange();
}

function onFuelChange() {
  const M = +document.getElementById('fuelSlider').value;
  document.getElementById('fuelVal').textContent = M + ' units';

  // Live STL time preview if route is same-system
  const timeEl = document.getElementById('fuelTime');
  const phys = shipPhysics(_currentShip, M);
  if (!_origin || !_dest || !phys || phys.theoretical || _origin.sysId !== _dest?.sysId) { timeEl.textContent = ''; return; }

  const oPl = _planets[_origin.planetId];
  const dPl = _planets[_dest.planetId];
  const rO  = oPl?.OrbitSemiMajorAxis;
  const rP  = dPl?.OrbitSemiMajorAxis;
  if (!rO || !rP) { timeEl.textContent = ''; return; }

  const dMax = hohmannArcKm(rO, rP);
  const dMin = chordKm(rO, rP);
  if (!dMax) { timeEl.textContent = ''; return; }

  const GM = sysGM(_origin.sysId);
  const rendez = (GM && oPl && dPl) ? stlRendezvous(oPl, dPl, GM, phys.accel, M, Date.now() / 1000) : null;

  let distStr, T;
  if (rendez) {
    distStr = `<span class="hl">${fmtDist(rendez.chargedKm)}</span>`;
    T = rendez.tReal;
  } else {
    distStr = `<span class="approx">${fmtDist(dMin)} – ${fmtDist(dMax)}</span>`;
    T = stlTimeReal(dMax, M, phys.accel);
  }
  if (T == null) { timeEl.textContent = ''; return; }
  timeEl.innerHTML = `${distStr} → <span class="hl">${fmtRealTime(T)}</span>`;
}

// ── Route finding ─────────────────────────────────────────────────────────────

function bfs(startId, endId) {
  if (startId === endId) return [startId];
  const visited = new Set([startId]);
  const queue = [[startId, [startId]]];
  while (queue.length) {
    const [cur, path] = queue.shift();
    for (const next of (_graph[cur] || [])) {
      if (next === endId) return [...path, next];
      if (!visited.has(next)) { visited.add(next); queue.push([next, [...path, next]]); }
    }
  }
  return null;
}

// ── Main calculation ──────────────────────────────────────────────────────────

async function calculate() {
  await loadData();
  const resEl = document.getElementById('results');

  if (!_origin) { resEl.innerHTML = '<div class="results-empty">Set a valid origin planet or system.</div>'; return; }
  if (!_dest)   { resEl.innerHTML = '<div class="results-empty">Set a valid destination planet or system.</div>'; return; }

  const M = +document.getElementById('fuelSlider').value;
  const phys = shipPhysics(_currentShip, M);
  const sameSys = _origin.sysId === _dest.sysId;

  const originSys = _systems[_origin.sysId];
  const destSys   = _systems[_dest.sysId];
  const originPl  = _planets[_origin.planetId];
  const destPl    = _planets[_dest.planetId];

  let html = '';
  let totalRealMin = 0;
  let totalDmg = 0;
  let totalFuelStl = 0;
  let totalFuelFtl = 0;

  // ── TO leg ──
  if (originPl) {
    const toAtm = (phys?.accel && originPl.Radius)
      ? atmLeg(originPl.Radius, originPl.Pressure ?? 0, phys.accel, 'to')
      : null;
    const toTimeRealS = toAtm ? toAtm.tReal : 886;
    const toFuel      = toAtm ? toAtm.M     : 50;
    const toKm        = toAtm ? toAtm.dKm   : 18514;
    totalRealMin += toTimeRealS / 60;
    totalFuelStl += toFuel;
    const hazards = planetHazardBadges(originPl);
    html += legHtml('TO', `${originPl.PlanetName || originPl.PlanetNaturalId} → orbit`, [
      ['Distance', fmtDist(toKm)],
      ['Time (real)', fmtRealTime(toTimeRealS)],
      ['STL fuel', toFuel + ' units'],
    ], hazards, 0, toAtm ? null : '(estimate — no ship selected)');
  }

  // ── FTL legs ──
  if (!sameSys) {
    const path = bfs(_origin.sysId, _dest.sysId);
    if (!path) {
      resEl.innerHTML = '<div class="results-empty">No route found between systems.</div>';
      return;
    }

    const ruf   = +document.getElementById('rufSlider').value / 100;
    const ftl   = ftlPhysics(_currentShip);
    const J     = (ftl) ? ftl.A * Math.exp(-ftl.beta * ruf) : null; // s/parsec for lane jumps

    let totalParsecs   = 0;
    let totalJumpSec   = 0;   // lane jump travel time
    let totalChargeSec = 0;   // charge time between lane jumps
    let totalGwSec     = 0;   // gateway time (always computable)
    let totalRadDmg    = 0;
    let laneJumps      = 0;   // count of consecutive lane hops (for charges)
    const hopDescs     = [];

    for (let i = 0; i < path.length - 1; i++) {
      const fromSys   = _systems[path[i]];
      const toSys     = _systems[path[i + 1]];
      if (!fromSys || !toSys) continue;
      const pc        = parsecsBetween(fromSys, toSys);
      const isGateway = _gatewayEdges.has(path[i] + '→' + path[i + 1]);
      const rd        = radDmgRaw(isGateway ? 0 : pc);
      totalParsecs += pc;
      totalRadDmg  += rd;

      let hopSec = null;
      if (isGateway) {
        // Paper §12.6 eq.19: 3 pc/hr + 1220s bracket (10+600+600+10)
        hopSec = pc * 1200 + 1220;
        totalGwSec += hopSec;
      } else {
        laneJumps++;
        if (J != null) {
          hopSec = J * pc;
          totalJumpSec += hopSec;
        }
      }

      const stats    = _sysStats[path[i + 1]] || {};
      const radBadge = stats.luminosity > 100 ? '<span class="hz-badge hz-rad" style="color:#f87171">RAD★</span>' :
                       stats.luminosity > 10  ? '<span class="hz-badge hz-rad">RAD</span>' : '';
      hopDescs.push({ from: fromSys.NaturalId, to: toSys.NaturalId, pc: pc.toFixed(2), isGateway, radBadge,
                      hopSec });
    }

    // Charges between consecutive lane jumps — (m-1) charges, each c·ρ seconds (paper §12.3)
    if (laneJumps > 1 && ftl?.c != null) {
      totalChargeSec = (laneJumps - 1) * ftl.c * ruf;
    }

    const totalFtlSec = totalJumpSec + totalChargeSec + totalGwSec;
    totalRealMin += totalFtlSec / 60;
    totalDmg += totalRadDmg;

    // Build per-hop rows
    const hopRows = hopDescs.map(h => {
      const timeStr = h.hopSec != null ? ` → ${fmtRealTime(h.hopSec)}` : '';
      return `<div class="leg-stat"><span class="k">${h.from} → ${h.to}${h.isGateway ? ' (gate)' : ''}</span><span class="v">${h.pc} pc${timeStr}  ${h.radBadge}</span></div>`;
    }).join('');

    const ftlRows = [];
    if (laneJumps > 0) {
      if (J != null) {
        ftlRows.push(['Jump time', fmtRealTime(totalJumpSec)]);
        if (laneJumps > 1 && ftl?.c != null)
          ftlRows.push([`Charge (${laneJumps-1}×${Math.round(ftl.c * ruf)}s)`, fmtRealTime(totalChargeSec)]);
        else if (laneJumps > 1)
          ftlRows.push(['Charge', '— reactor stats missing']);
      } else {
        ftlRows.push(['Jump time', `<span style="color:var(--text3)">— select ship</span>`]);
      }
    }
    if (totalGwSec > 0) ftlRows.push(['Gateway time', fmtRealTime(totalGwSec)]);
    ftlRows.push(['Radiation dmg', fmtDmg(totalRadDmg)]);

    const ftlNote = ftl?.estimated ? '⚠ Reactor constants from paper estimates — calibrate against APEX' : null;
    const numJumps = path.length - 1;
    html += legHtml('FTL', `${numJumps} jump${numJumps > 1 ? 's' : ''} — ${totalParsecs.toFixed(2)} pc`,
      ftlRows, hopRows, totalRadDmg, ftlNote);
  }

  // ── STL leg (in dest system) ──
  // If same-system and origin was selected as a system (not a planet), fall back
  // to the innermost surface planet as a proxy for the departure orbit.
  const stlOriginFallback = sameSys && !originPl ? primePlanetInSys(_origin.sysId) : null;
  const stlOriginPl = sameSys ? (originPl || stlOriginFallback) : primePlanetInSys(_dest.sysId);
  const stlRO = stlOriginPl?.OrbitSemiMajorAxis;
  const stlRP = destPl?.OrbitSemiMajorAxis;
  let stlDistKm = null, stlTimeMin = null, stlMet = 0;

  if (stlRO && stlRP) {
    stlDistKm = hohmannArcKm(stlRO, stlRP);
    const stlDistMinKm = chordKm(stlRO, stlRP);
    const density = (_sysStats[_dest.sysId] || {}).meteoroidDensity || 0;
    stlMet = destPl ? meteorDmgRaw(destPl.OrbitSemiMajorAxis, density) : 0;
    totalDmg += stlMet;

    // Rendezvous solver: transfer ellipse arc for given M — paper Section 8
    const stlGM = sysGM(_dest.sysId);
    const rendez = (stlGM && stlOriginPl && destPl && phys?.accel && M > 0)
      ? stlRendezvous(stlOriginPl, destPl, stlGM, phys.accel, M, Date.now() / 1000)
      : null;

    const stlRows = [];
    if (rendez) {
      stlRows.push(['Distance', `${fmtDist(rendez.chargedKm)} <small style="color:var(--text3)">(${rendez.isReduced ? 'charged, reduced' : 'charged'})</small>`]);
    } else if (stlDistKm) {
      stlRows.push(['Distance', `<span class="approx">${fmtDist(stlDistMinKm)} – ${fmtDist(stlDistKm)}</span> <small style="color:var(--text3)">(best–worst phase)</small>`]);
    }

    if (rendez) {
      stlTimeMin = rendez.tReal / 60;
      totalRealMin += stlTimeMin;
      totalFuelStl += M;
      stlRows.push(['Time (real)', fmtRealTime(rendez.tReal)]);
      stlRows.push(['STL fuel', M + ' units']);
    } else if (!phys) {
      stlRows.push(['Time (real)', '<span style="color:var(--text3)">— load a ship</span>']);
    } else if (phys.theoretical) {
      stlRows.push(['Time (real)', '<span style="color:var(--text3)">— hull not calibrated</span>']);
      totalFuelStl += M;
      stlRows.push(['STL fuel', M + ' units']);
    } else if (stlDistKm && phys?.accel) {
      const T = stlTimeReal(stlDistKm, M, phys.accel);
      if (T != null) {
        stlTimeMin = T / 60;
        totalRealMin += stlTimeMin;
        totalFuelStl += M;
        stlRows.push(['Time (real)', `<span class="approx">${fmtRealTime(T)}</span>`]);
        stlRows.push(['STL fuel', M + ' units']);
      }
    }

    stlRows.push(['Meteor dmg', fmtDmg(stlMet)]);

    const metBadge = density > 3.5 ? '<span class="hz-badge hz-met" style="color:#f87171">MET★</span>' :
                     density > 2.0 ? '<span class="hz-badge hz-met">MET</span>' : '';

    const stlNote = stlOriginFallback
      ? `⚠ Origin is a system — using ${stlOriginFallback.PlanetName || stlOriginFallback.PlanetNaturalId} as departure orbit (select a specific planet for accuracy)`
      : (phys?.theoretical && !rendez) ? '⚠ Hull not calibrated — time is a rough estimate'
      : !stlGM ? '⚠ System GM unknown — showing range not exact distance'
      : null;
    html += legHtml('STL', destPl ? `→ ${destPl.PlanetName || destPl.PlanetNaturalId}` : `within ${destSys?.NaturalId}`,
      stlRows, metBadge, stlMet, stlNote);
  }

  // ── LDG leg ──
  if (destPl) {
    const ldgAtm = (phys?.accel && destPl.Radius)
      ? atmLeg(destPl.Radius, destPl.Pressure ?? 0, phys.accel, 'ldg')
      : null;
    const ldgTime = ldgAtm ? ldgAtm.tReal : 886;
    const ldgFuel = ldgAtm ? ldgAtm.M     : 50;
    const ldgKm   = ldgAtm ? ldgAtm.dKm   : 18514;
    totalRealMin += ldgTime / 60;
    totalFuelStl += ldgFuel;
    const hazards = planetHazardBadges(destPl);
    html += legHtml('LDG', `Orbit → ${destPl.PlanetName || destPl.PlanetNaturalId}`, [
      ['Distance', fmtDist(ldgKm)],
      ['Time (real)', fmtRealTime(ldgTime)],
      ['STL fuel', ldgFuel + ' units'],
    ], hazards, 0, ldgAtm
      ? '⚠ Planetary median ±15% — actual varies by approach geometry &amp; base tile position (paper §1.2)'
      : '(estimate — no ship selected)');
  }

  // ── Shield recommendation ──
  const shieldRec = buildShieldRec(_origin, _dest, sameSys);

  // ── Totals ──
  const stlTimeKnown = phys != null;
  const timeLabel = stlTimeKnown ? 'Total Time (real)' : 'Total Time (excl. STL)';
  html += `<hr class="results-divider">
    <div class="total-row"><span class="k">${timeLabel}</span><span class="v${stlTimeKnown ? '' : ' approx'}">${fmtMin(totalRealMin)}</span></div>
    <div class="total-row"><span class="k">Total Hull Damage</span><span class="v dmg${totalDmg > 0.05 ? ' high' : ''}">${fmtDmg(totalDmg)}</span></div>
    <div class="total-row"><span class="k">STL Fuel Used</span><span class="v">${totalFuelStl} units</span></div>
    ${shieldRec}
    <div class="note" style="margin-top:0.75rem">STL: transfer ellipse arc rendezvous solver (paper §8). TO/LDG: paper §12.4. FTL: A·e^(−β·ρ)·d + charges (paper §12.1–12.3); gateway 3 pc/hr + 1220s (§12.6). Damage: no shielding.</div>
  `;

  resEl.innerHTML = html;
}

function legHtml(type, dest, rows, extra, dmg, note) {
  const dmgClass = dmg > 0.05 ? 'leg-dmg high' : 'leg-dmg';
  const rowsHtml = rows.map(([k, v]) => `<div class="leg-stat"><span class="k">${k}</span><span class="v">${v}</span></div>`).join('');
  return `
    <div class="leg">
      <div class="leg-head">
        <span class="leg-type ${type.toLowerCase()}">${type}</span>
        <span class="leg-dest">${dest}</span>
      </div>
      <div class="leg-body">
        ${rowsHtml}
        ${extra ? `<div style="margin-top:3px">${extra}</div>` : ''}
        ${note ? `<div class="note" style="margin-top:3px">${note}</div>` : ''}
      </div>
    </div>`;
}

function planetHazardBadges(p) {
  let s = '<div class="hz">';
  if (p.Pressure > 2) s += `<span class="hz-badge hz-heat" title="${p.Pressure.toFixed(1)} atm">HEAT</span>`;
  if (p.Gravity > 2.0 || p.Gravity < 0.25) s += `<span class="hz-badge hz-grav" title="${p.Gravity.toFixed(2)}g">GRAV</span>`;
  s += '</div>';
  return s;
}

function buildShieldRec(origin, dest, sameSys) {
  const planets = [origin?.planetId, dest?.planetId].filter(Boolean).map(id => _planets[id]).filter(Boolean);
  const needHeat = planets.some(p => p.Pressure > 2);
  const needGrav = planets.some(p => p.Gravity > 2.0 || p.Gravity < 0.25);
  const sysIds = sameSys ? [dest.sysId] : (() => {
    if (!origin?.sysId || !dest?.sysId) return [];
    const path = bfs(origin.sysId, dest.sysId) || [];
    return path.map(id => id);
  })();
  const maxLum = Math.max(0, ...sysIds.map(id => (_sysStats[id] || {}).luminosity || 0));
  const maxDen = Math.max(0, ...sysIds.map(id => (_sysStats[id] || {}).meteoroidDensity || 0));
  const recs = [];
  if (needHeat) recs.push('<span class="hz-badge hz-heat">HEAT shield</span>');
  if (needGrav) recs.push('<span class="hz-badge hz-grav">GRAV stabilizer</span>');
  if (maxLum > 100) recs.push('<span class="hz-badge hz-rad" style="color:#f87171">RAD shield ★</span>');
  else if (maxLum > 10) recs.push('<span class="hz-badge hz-rad">RAD shield</span>');
  if (maxDen > 3.5) recs.push('<span class="hz-badge hz-met" style="color:#f87171">WHIPPLE ★</span>');
  else if (maxDen > 2.0) recs.push('<span class="hz-badge hz-met">WHIPPLE shield</span>');
  if (!recs.length) return '';
  return `<div class="total-row" style="margin-top:4px"><span class="k">Shields Recommended</span><span class="v"><div class="hz">${recs.join(' ')}</div></span></div>`;
}

function primePlanetInSys(sysId) {
  // Returns planet with lowest orbit index in system, as STL departure point
  const candidates = Object.values(_planets).filter(p => p.SystemId === sysId && p.Surface);
  if (!candidates.length) return null;
  return candidates.reduce((a, b) => (a.OrbitIndex < b.OrbitIndex ? a : b));
}

// ── Init ──────────────────────────────────────────────────────────────────────

(async () => {
  const savedKey  = localStorage.getItem(FIO_KEY) || '';
  if (savedKey) document.getElementById('fioKey').value = savedKey;
  document.getElementById('fuelSlider').addEventListener('input', onFuelChange);
  onFuelChange();
  await loadData();
})();
</script>
