// accel = min(thrust / totalMass, maxGFactor·G0); totalMass = empty + onboard, on the raw
// Swagger Mass scale (no conversion). Verified 2026-07-02: thrust / raw-Mass == Swagger
// Acceleration, the game-unit scale stlTimeReal expects. maxGFactor is null in Real Fleet (no loadout → no cap; a no-op
// for this fleet) and hull+seat-derived in Hypothetical mode.
function shipPhysics(ship) {
  if (!ship || !ship.thrust || !ship.operatingEmptyMass) return null;
  const o = onboardMassT();
  const totalMass = ship.operatingEmptyMass + o.stl + o.ftl + o.cargo;
  if (totalMass <= 0) return null;
  let accel = ship.thrust / totalMass;
  const cap = ship.maxGFactor ? ship.maxGFactor * G0 : Infinity;
  const gLimited = accel > cap;
  if (gLimited) accel = cap;
  // "STL fuel for leg" (M) slider max = ship's actual STL fuel onboard, in UNITS.
  const stlFuelMax = ship.stlFuelLoad != null ? Math.round(ship.stlFuelLoad / STL_UNIT_MASS) : 200;
  return { accel, totalMass, gLimited, stlFuelMax, mMin: 1 };
}

// Fix 1 (fuel-starved departure) is applied only in departureLegCalc via depBudgetM —
// DEP leg only. NOT applied to same-system transits until validated against captured data.

// ── Fuel (derived) ────────────────────────────────────────────────────────────
// The "STL fuel for leg" slider was removed — per-leg STL fuel is fully derived from the
// fuel usage factor in calculate(). These two functions are retained as no-ops so the many
// existing call sites (onShipChange, rebuildHypo, etc.) keep working without change.
function updateFuelSlider() { /* no-op: STL fuel is derived, not user-set */ }
function onFuelChange()      { /* no-op: STL fuel is derived, not user-set */ }

// ── Route finding ─────────────────────────────────────────────────────────────

function bfs(startId, endId) {
  if (startId === endId) return [startId];
  const visited = new Set([startId]);
  const queue = [[startId, [startId]]];
  while (queue.length) {
    const [cur, path] = queue.shift();
    for (const next of (_graph[cur] || [])) {
      if (next === endId) return [...path, next];
      if (!visited.has(next)) { visited.add(next); queue.push([next, [...path, next]]); }
    }
  }
  return null;
}

// ── Main calculation ──────────────────────────────────────────────────────────

async function calculate() {
  await loadData();
  const resEl = document.getElementById('results');

  if (!_origin) { resEl.innerHTML = '<div class="results-empty">Set a valid origin planet or system.</div>'; return; }
  if (!_dest)   { resEl.innerHTML = '<div class="results-empty">Set a valid destination planet or system.</div>'; return; }

  // Fuel usage factor — game "fuel usage" setting. All STL segment fuel is derived: each
  // segment's physics-computed max × fuf. TO/LND fixed (no factor); DEP capped at its max;
  // APPROACH & same-system transit scale linearly; JUMP/FTL untouched. There is no user-set
  // per-leg STL fuel any more (the "STL fuel for leg" slider was removed).
  const fuf = Math.min(1, Math.max(0.1, +document.getElementById('fufInput').value || 0.5));
  const phys = shipPhysics(_currentShip);
  const sh = shieldingFor(_currentShip);   // {general,heat,whipple,radiation,gravity}
  const sameSys = _origin.sysId === _dest.sysId;

  const originSys = _systems[_origin.sysId];
  const destSys   = _systems[_dest.sysId];
  const originPl  = _planets[_origin.planetId];
  const destPl    = _planets[_dest.planetId];

  let html = '';
  let totalRealMin = 0;
  let totalDmg = 0;
  let totalFuelStl = 0;
  let totalFuelFtl = 0;

  const nowUnix = Date.now() / 1000;
  let t = nowUnix; // Unix time threaded through legs for planet position lookups

  // Route path (needed by DEP and approach gate; hoisted before TO)
  const path = !sameSys ? bfs(_origin.sysId, _dest.sysId) : null;
  if (!sameSys && !path) {
    resEl.innerHTML = '<div class="results-empty">No route found between systems.</div>';
    return;
  }

  // Planet position closures — station data first, then ephemeris, then FIO fallback
  const originGM = sysGM(_origin.sysId);
  const stlGM    = sysGM(_dest.sysId);

  // Station lookup — real orbital data when available
  const originStation = !originPl ? (_stationsBySys[_origin.sysId] || null) : null;
  const destStation   = !destPl   ? (_stationsBySys[_dest.sysId]   || null) : null;
  // Planet proxy — only when no station data exists for the system
  const stlOriginFallback = !originPl && !originStation ? primePlanetInSys(_origin.sysId) : null;
  const stlDestFallback   = !destPl   && !destStation   ? primePlanetInSys(_dest.sysId)   : null;

  const originRefPl = originPl || stlOriginFallback;
  const destRefPl   = destPl   || stlDestFallback;
  const originInEph = !!(originRefPl?.PlanetNaturalId && _ephemeris[originRefPl.PlanetNaturalId]);
  const destInEph   = !!(destRefPl?.PlanetNaturalId   && _ephemeris[destRefPl.PlanetNaturalId]);
  const getOriginPos = originStation
    ? (_, tt) => stationXYZ(originStation, tt)
    : originInEph
      ? (pl, tt) => planetXYZFromEph(pl.PlanetNaturalId, tt)
      : (pl, tt) => (originGM && pl?.OrbitSemiMajorAxis)
          ? planetXYZ(tt, pl.OrbitSemiMajorAxis, pl.OrbitEccentricity||0, pl.OrbitInclination||0, originGM)
          : null;
  const getDestPos = destStation
    ? (_, tt) => stationXYZ(destStation, tt)
    : destInEph
      ? (pl, tt) => planetXYZFromEph(pl.PlanetNaturalId, tt)
      : (pl, tt) => (stlGM && pl?.OrbitSemiMajorAxis)
          ? planetXYZ(tt, pl.OrbitSemiMajorAxis, pl.OrbitEccentricity||0, pl.OrbitInclination||0, stlGM)
          : null;

  // TO & LND fuel are needed up-front by the same-system TRANSIT fuel formula (tank − TO − LND);
  // hoisted to function scope. ldgFuelUnits is computed early (below) and reused by the LDG leg.
  let toFuelUnits = 0, ldgFuelUnits = 0;

  // ── TO leg ──
  let toTimeRealS = 0;
  if (originPl) {
    const toAtm = (phys?.accel && originPl.Radius)
      ? atmLeg(originPl.Radius, originPl.Pressure ?? 0, phys.accel, 'to', _currentShip?.stlFlowRate)
      : null;
    toTimeRealS        = toAtm ? toAtm.tReal : 886;
    toFuelUnits        = toAtm ? toAtm.M     : 50;
    const toKm        = toAtm ? toAtm.dKm   : 18514;
    totalRealMin += toTimeRealS / 60;
    totalFuelStl += toFuelUnits;
    const hazards = planetHazardBadges(originPl);
    html += legHtml('TO', `${originPl.PlanetName || originPl.PlanetNaturalId} → orbit`, [
      ['Distance', fmtDist(toKm)],
      ['Time (real)', fmtRealTime(toTimeRealS)],
      ['STL fuel', toFuelUnits.toFixed(1) + ' units'],
    ], hazards, 0, toAtm ? null : '(estimate — no ship selected)');
  }
  t += toTimeRealS;

  // ── DEP leg (multi-system only) ──
  const depOriginPl = originPl || stlOriginFallback; // null when origin is a known station
  const hasDepOrigin = !!(originStation || depOriginPl);
  if (!sameSys && hasDepOrigin && phys?.accel) {
    const base = getOriginPos(depOriginPl, t); // station closure ignores first arg
    const gate = base ? gatePositionM(base, _origin.sysId, path[1]) : null;
    if (base && gate) {
      const vel = planetVelocityKmS(depOriginPl, t, getOriginPos);
      // Fix 1 — departure fuel budget (first segment): floor(STL fuel onboard / flow rate).
      const depBudgetM = (_currentShip?.stlFlowRate && onboardMassT().stl > 0)
        ? Math.floor(onboardMassT().stl / _currentShip.stlFlowRate) : null;
      const dep = departureLegCalc(base, gate, vel, phys.accel, depBudgetM);
      if (dep) {
        // ⚠ UNVALIDATED against a real in-game multi-system flight. Marcus's departure
        // budget: M_dep = min(√(d/(4a)), 13.34·fuf·stlFuel_t/accel); the /STL_UNIT_MASS
        // tonnes→units step is our addition and is NOT confirmed. The earlier "HRT→Promitor
        // = 3474 u" test was mis-specified: that route is SAME-SYSTEM (TRA+LND, ~1766 u,
        // no DEP leg) and already matches in-game — it never exercised this block. TODO:
        // capture a true cross-system flight (with an actual jump gate) to validate/fit this.
        const stlFuel_t = _currentShip?.stlFuelCap ?? 0;
        const depFuelTonnes = Math.min(
          Math.sqrt(dep.chargedKm / (4 * phys.accel)),
          13.34 * fuf * stlFuel_t / phys.accel
        );
        const depFuel = depFuelTonnes / STL_UNIT_MASS;
        totalRealMin += dep.tReal / 60;
        totalFuelStl += depFuel;
        t += dep.tReal;
        // DEPARTURE meteoroid ablation — origin system density, general shielding.
        // Real departure transit distance (dep.chargedKm) ÷ 1e6 to match the refit k's distance scale.
        const depDensity = (_sysStats[_origin.sysId] || {}).meteoroidDensity || 0;
        const depMet = dep.chargedKm ? applyShield(meteorDmgRaw(dep.chargedKm / 1e6, depDensity), sh.general) : 0;
        totalDmg += depMet;
        const depLabel = originStation?.name ?? depOriginPl?.PlanetName ?? depOriginPl?.PlanetNaturalId;
        const depNote = dep.starved
          ? `⚠ Fuel-starved departure — M capped at ${dep.M.toFixed(1)} by STL fuel budget (${onboardMassT().stl.toFixed(1)} t)`
          : (!originStation && !originInEph) ? '⚠ Origin not in fitted ephemeris — gate position estimated'
          : '⚠ Departure thrust term not yet isolated — modelled as ablation only';
        html += legHtml('DEP', `${depLabel} → jump gate`, [
          ['Distance', fmtDist(dep.chargedKm)],
          ['Time (real)', fmtRealTime(dep.tReal)],
          ['STL fuel', depFuel.toFixed(1) + ' units'],
          ['Meteor dmg', fmtDmg(depMet)],
        ], '', depMet, depNote);
      }
    }
  }

  // ── FTL legs ──
  if (!sameSys) {
    const ruf   = +document.getElementById('rufSlider').value / 100;
    const ftl   = ftlPhysics(_currentShip);
    const J     = (ftl) ? ftl.A * Math.exp(-ftl.beta * ruf) : null; // s/parsec for lane jumps

    let totalParsecs   = 0;
    let totalJumpSec   = 0;   // lane jump travel time
    let totalChargeSec = 0;   // charge time between lane jumps
    let totalGwSec     = 0;   // gateway time (always computable)
    let totalRadDmg    = 0;   // lane-jump FTL radiation (radiation shielding)
    let totalGwDmg     = 0;   // gateway wear (general shielding)
    let laneJumps      = 0;   // count of consecutive lane hops (for charges)
    const hopDescs     = [];

    for (let i = 0; i < path.length - 1; i++) {
      const fromSys   = _systems[path[i]];
      const toSys     = _systems[path[i + 1]];
      if (!fromSys || !toSys) continue;
      const pc        = parsecsBetween(fromSys, toSys);
      const isGateway = _gatewayEdges.has(path[i] + '→' + path[i + 1]);
      totalParsecs += pc;

      let hopSec = null;
      if (isGateway) {
        // Paper §12.6 eq.19: 3 pc/hr + 1220s bracket (10+600+600+10)
        hopSec = pc * 1200 + 1220;
        totalGwSec += hopSec;
        totalGwDmg += applyShield(GATEWAY_DMG, sh.general);  // fixed per hop, general shield
      } else {
        laneJumps++;
        totalRadDmg += applyShield(radDmgRaw(pc), sh.radiation);  // FTL radiation, rad shield
        if (J != null) {
          hopSec = J * pc;
          totalJumpSec += hopSec;
        }
      }

      const stats    = _sysStats[path[i + 1]] || {};
      const radBadge = stats.luminosity > 100 ? '<span class="hz-badge hz-rad" style="color:#f87171">RAD★</span>' :
                       stats.luminosity > 10  ? '<span class="hz-badge hz-rad">RAD</span>' : '';
      hopDescs.push({ from: fromSys.NaturalId, to: toSys.NaturalId, pc: pc.toFixed(2), isGateway, radBadge,
                      hopSec });
    }

    // Charges between consecutive lane jumps — (m-1) charges, each c·ρ seconds (paper §12.3)
    if (laneJumps > 1 && ftl?.c != null) {
      totalChargeSec = (laneJumps - 1) * ftl.c * ruf;
    }

    // CHARGE damage — one reactor charge per lane jump, fixed per reactor type (spec §2c).
    // Location/environment independent → no shielding.
    const chargeUnit  = CHARGE_DMG[_currentShip?.reactorPower] ?? CHARGE_DMG[2000];
    const totalChargeDmg = laneJumps * chargeUnit;
    const totalFtlDmg = totalRadDmg + totalGwDmg + totalChargeDmg;

    const totalFtlSec = totalJumpSec + totalChargeSec + totalGwSec;
    totalRealMin += totalFtlSec / 60;
    totalDmg += totalFtlDmg;
    t += totalFtlSec;

    // Build per-hop rows
    const hopRows = hopDescs.map(h => {
      const timeStr = h.hopSec != null ? ` → ${fmtRealTime(h.hopSec)}` : '';
      return `<div class="leg-stat"><span class="k">${h.from} → ${h.to}${h.isGateway ? ' (gate)' : ''}</span><span class="v">${h.pc} pc${timeStr}  ${h.radBadge}</span></div>`;
    }).join('');

    const ftlRows = [];
    if (laneJumps > 0) {
      if (J != null) {
        ftlRows.push(['Jump time', fmtRealTime(totalJumpSec)]);
        if (laneJumps > 1 && ftl?.c != null)
          ftlRows.push([`Charge (${laneJumps-1}×${Math.round(ftl.c * ruf)}s)`, fmtRealTime(totalChargeSec)]);
        else if (laneJumps > 1)
          ftlRows.push(['Charge', '— reactor stats missing']);
      } else {
        ftlRows.push(['Jump time', `<span style="color:var(--text3)">— select ship</span>`]);
      }
    }
    if (totalGwSec > 0) ftlRows.push(['Gateway time', fmtRealTime(totalGwSec)]);
    if (totalRadDmg > 0) ftlRows.push(['Radiation dmg', fmtDmg(totalRadDmg)]);
    if (totalGwDmg > 0)  ftlRows.push(['Gateway dmg', fmtDmg(totalGwDmg)]);
    ftlRows.push(['Charge dmg', fmtDmg(totalChargeDmg)]);

    const ftlNote = ftl?.estimated ? '⚠ Reactor constants from paper estimates — calibrate against APEX' : null;
    const numJumps = path.length - 1;
    html += legHtml('FTL', `${numJumps} jump${numJumps > 1 ? 's' : ''} — ${totalParsecs.toFixed(2)} pc`,
      ftlRows, hopRows, totalFtlDmg, ftlNote);
  }

  // ── STL / APPROACH leg ──
  const stlDestPl  = destPl || stlDestFallback;   // null when dest is a known station
  const stlDestSMA = destStation ? destStation.a_m * 1000 : stlDestPl?.OrbitSemiMajorAxis;
  const density = (_sysStats[_dest.sysId] || {}).meteoroidDensity || 0;
  // APPROACH/TRANSIT meteoroid ablation — general shielding (spec §3b). Computed below,
  // once the real transit distance (rendez.chargedKm / stlDistKm) has been solved.
  let stlMet = 0;

  // LND fuel — STL burn physics, same as atmLeg/take-off: fuel = √(dist/(13.71·accel/350.11)) × flow/0.015
  // (≈ 337 × flow × √(dist/accel)). Engine-dependent via flow rate AND acceleration — confirmed 2026-07-14
  // on a controlled 5-engine set (k≈340 loaded-accel across STD/GLASS/ADV/FUEL-SAVER; Hyperthrust reads
  // ~21% high, unmodelled). Replaces the old flat per-blueprint constant. Computed up-front (in UNITS) so
  // the same-system TRANSIT fuel formula (tank − TO − LND) can use it, unchanged.
  if (destPl) {
    const lndDistKm = destPl.Radius ? landingDistKm(destPl.Radius / 1000, destPl.Pressure ?? 0) : 18514;
    const lndFuelT = phys?.accel
      ? Math.sqrt(lndDistKm / (13.71 * (phys.accel / 350.11))) * ((_currentShip?.stlFlowRate ?? 0.015) / 0.015)
      : 0.576 * Math.sqrt(lndDistKm);
    ldgFuelUnits = Math.round(lndFuelT);
  }

  let rendez = null;
  let stlDistKm = null, stlDistMinKm = null;
  let stlLegLabel = '';
  let stlComputedMax = null; // physics-computed max STL fuel (units) for this leg; fuel = × fuf

  const stlDestLabel = destStation?.name ?? stlDestPl?.PlanetName ?? stlDestPl?.PlanetNaturalId;

  if (sameSys) {
    // Direct transit within system
    const stlOriginPl  = originPl || stlOriginFallback;
    const stlOriginSMA = originStation ? originStation.a_m * 1000 : stlOriginPl?.OrbitSemiMajorAxis;
    const stlRO = stlOriginSMA;
    const stlRP = stlDestSMA;
    if (stlRO && stlRP) {
      stlDistKm    = hohmannArcKm(stlRO, stlRP);
      stlDistMinKm = chordKm(stlRO, stlRP);
      if (phys?.accel && stlDistKm) {
        // computedMax = triangular-boundary M for the worst-case (Hohmann) transit distance.
        stlComputedMax = Math.max(1, Math.ceil(Math.sqrt(stlDistKm / (4 * phys.accel))));
        if (stlGM)
          rendez = stlRendezvous(
            stlOriginPl, stlDestPl, stlGM, phys.accel, stlComputedMax, t,
            originStation ? getOriginPos : null,
            destStation   ? getDestPos   : null
          );
      }
    }
    stlLegLabel = stlDestLabel ? `→ ${stlDestLabel}` : `within ${destSys?.NaturalId}`;
  } else {
    // Approach from jump gate in dest system → dest planet or station
    const hasApproachDest = !!(stlDestPl || destStation);
    if (hasApproachDest && phys?.accel && path) {
      const destPosAtGate = getDestPos(stlDestPl, t); // station closure ignores first arg
      const gateApp = destPosAtGate ? gatePositionM(destPosAtGate, _dest.sysId, path[path.length - 2]) : null;
      if (gateApp) {
        // NOTE: APPROACH *fuel* is no longer taken from approachComputedMax — it is now the
        // tank-capacity formula (see display block below). We still call it purely to obtain the
        // rendezvous (rendez), which drives the leg's DISTANCE, meteoroid DAMAGE, and flight TIME
        // — all of which must stay unchanged. stlComputedMax is intentionally left null here.
        const appMax = approachComputedMax(gateApp, stlDestPl, stlGM, phys.accel, t,
                          destStation ? getDestPos : null);
        if (appMax) rendez = appMax.rendez;
      }
    }
    stlLegLabel = stlDestLabel ? `jump gate → ${stlDestLabel}` : `approach in ${destSys?.NaturalId}`;
  }

  // Meteor ablation on the REAL STL transit distance: rendezvous arc when solved, else the
  // same-system Hohmann arc. ÷ 1e6 to match the refit k's distance scale. No distance → 0.
  const stlTransitDistKm = rendez ? rendez.chargedKm : stlDistKm;
  if (stlTransitDistKm) {
    stlMet = applyShield(meteorDmgRaw(stlTransitDistKm / 1e6, density), sh.general);
    totalDmg += stlMet;
  }

  const hasStlContent = sameSys
    ? !!(stlDestSMA || originStation || stlOriginFallback || originPl)
    : !!(stlDestPl || destStation);
  if (hasStlContent) {
    const stlRows = [];
    if (rendez) {
      const stlLabel = rendez.approx
        ? `${fmtDist(rendez.chargedKm)} <small style="color:var(--text3)" title="One or both planets not in fitted ephemeris — using FIO orbital elements (accuracy not guaranteed)">(${rendez.isReduced ? 'charged, reduced' : 'charged'}, estimated)</small>`
        : `${fmtDist(rendez.chargedKm)} <small style="color:var(--text3)">(${rendez.isReduced ? 'charged, reduced' : 'charged'})</small>`;
      stlRows.push(['Distance', stlLabel]);
    } else if (stlDistKm) {
      stlRows.push(['Distance', `<span class="approx">${fmtDist(stlDistMinKm)} – ${fmtDist(stlDistKm)}</span> <small style="color:var(--text3)">(best–worst phase)</small>`]);
    }

    // APPROACH fuel (multi-system) = STL tank capacity × 0.491 × fuel usage factor. Empirically
    // confirmed across 3 ships / 3 tank sizes / multiple routes — independent of distance, accel,
    // and orbital geometry. Tank capacity (units) = stlFuelCap[t] / STL_UNIT_MASS, falling back to
    // the loadout slider max for hypothetical builds that carry no capacity field.
    // Same-system direct transit keeps the physics boundary-M × fuf derivation.
    const stlTankCapacity = _currentShip?.stlFuelCap != null
      ? _currentShip.stlFuelCap / STL_UNIT_MASS
      : (+document.getElementById('stlMassSlider').max || 0);
    // Same-system TRANSIT fuel = (tank − TO − LND) × fuf. Confirmed across two tank sizes and two
    // routes (2026-07-11). Kept separate from stlComputedMax, which remains the physics boundary-M
    // driving the flight time / rendezvous (unchanged). Multi-system APPROACH is untouched.
    const stlTransitFuel = phys ? Math.max(0, Math.round((stlTankCapacity - toFuelUnits - ldgFuelUnits) * fuf)) : null;
    const stlFuel = !sameSys
      ? stlTankCapacity * 0.491 * fuf
      : stlTransitFuel;
    if (rendez) {
      totalRealMin += rendez.tReal / 60;
      if (stlFuel != null) totalFuelStl += stlFuel;
      stlRows.push(['Time (real)', fmtRealTime(rendez.tReal)]);
      if (stlFuel != null) stlRows.push(['STL fuel', stlFuel.toFixed(1) + ' units']);
    } else if (!phys) {
      stlRows.push(['Time (real)', '<span style="color:var(--text3)">— select a ship / build</span>']);
    } else if (stlDistKm && phys?.accel && stlComputedMax != null) {
      const T = stlTimeReal(stlDistKm, stlComputedMax, phys.accel);
      if (T != null) {
        totalRealMin += T / 60;
        totalFuelStl += stlTransitFuel;
        stlRows.push(['Time (real)', `<span class="approx">${fmtRealTime(T)}</span>`]);
        stlRows.push(['STL fuel', stlTransitFuel.toFixed(1) + ' units']);
      }
    }

    stlRows.push(['Meteor dmg', fmtDmg(stlMet)]);

    const metBadge = density > 3.5 ? '<span class="hz-badge hz-met" style="color:#f87171">MET★</span>' :
                     density > 2.0 ? '<span class="hz-badge hz-met">MET</span>' : '';

    const stlNote = (!stlGM && sameSys) ? '⚠ System GM unknown — showing range not exact distance'
      : null;
    html += legHtml('STL', stlLegLabel, stlRows, metBadge, stlMet, stlNote);
  }

  // ── LDG leg ──
  if (destPl) {
    const ldgAtm = (phys?.accel && destPl.Radius)
      ? atmLeg(destPl.Radius, destPl.Pressure ?? 0, phys.accel, 'ldg')
      : null;
    const ldgTime = ldgAtm ? ldgAtm.tReal : 886;
    // Landing distance — planet_term (mean of the plot-roll distribution), ±15% band.
    const ldgKm   = destPl.Radius
      ? landingDistKm(destPl.Radius / 1000, destPl.Pressure ?? 0)
      : (ldgAtm ? ldgAtm.dKm : 18514);
    // LND fuel — STL burn physics (flow + accel dependent), same as atmLeg/take-off. ldgFuelUnits reused for the total.
    const lndFuelT = phys?.accel
      ? Math.sqrt(ldgKm / (13.71 * (phys.accel / 350.11))) * ((_currentShip?.stlFlowRate ?? 0.015) / 0.015)
      : 0.576 * Math.sqrt(ldgKm);
    const ldgFuel = ldgFuelUnits;
    totalRealMin += ldgTime / 60;
    totalFuelStl += ldgFuel;
    // LANDING damage — M2 fitted formula (2026-07-05), heat shielding applied via applyShield.
    const ldgDmg = (phys?.accel && destPl.Radius)
      ? applyShield(landingDmgRaw(ldgKm, phys.accel, destPl.Pressure ?? 0.001), sh.heat)
      : 0;
    totalDmg += ldgDmg;
    const hazards = planetHazardBadges(destPl);
    html += legHtml('LDG', `Orbit → ${destPl.PlanetName || destPl.PlanetNaturalId}`, [
      ['Distance', ldgKm.toFixed(1) + ' km (±15%)'],
      ['Time (real)', fmtRealTime(ldgTime)],
      ['STL fuel', lndFuelT.toFixed(1) + ' units (±15%)'],
      ['Landing dmg', fmtDmg(ldgDmg)],
    ], hazards, ldgDmg, ldgAtm
      ? '⚠ Planetary median ±15% — actual varies by approach geometry &amp; base tile position (paper §1.2).'
      : '(estimate — no ship selected)');
  }

  // ── Shield recommendation ──
  const shieldRec = buildShieldRec(_origin, _dest, sameSys);

  // ── Totals ──
  const stlTimeKnown = phys != null;
  const timeLabel = stlTimeKnown ? 'Total Time (real)' : 'Total Time (excl. STL)';

  // Condition feedback — trip damage is the sum of all segment damage (spec §4).
  // Real fleet: project current condition forward. Threshold alerts (spec §5): amber <80%, red <50%.
  let condRows = '';
  let alertBanner = '';
  const isReal = _currentShip?.source === 'real';
  if (isReal && _currentShip?.condition != null) {
    const cur = _currentShip.condition;
    const proj = cur - totalDmg;
    const projClass = proj < 0.50 ? ' high' : '';
    condRows =
      `<div class="total-row"><span class="k">Current Condition</span><span class="v">${(cur * 100).toFixed(1)}%</span></div>` +
      `<div class="total-row"><span class="k">Projected Condition</span><span class="v dmg${projClass}">${(proj * 100).toFixed(1)}%</span></div>`;
    if (proj < 0.50)
      alertBanner = `<div class="note" style="margin-top:0.5rem;color:#f87171;font-weight:600">🔴 Ship condition critical after this route (${(proj*100).toFixed(1)}%) — repair before flying</div>`;
    else if (proj < 0.80)
      alertBanner = `<div class="note" style="margin-top:0.5rem;color:#fbbf24;font-weight:600">⚠ Ship condition will drop below 80% (${(proj*100).toFixed(1)}%) — speed penalty applies</div>`;
  }

  html += `<hr class="results-divider">
    <div class="total-row"><span class="k">${timeLabel}</span><span class="v${stlTimeKnown ? '' : ' approx'}">${fmtMin(totalRealMin)}</span></div>
    <div class="total-row"><span class="k">Trip Hull Damage</span><span class="v dmg${totalDmg > 0.05 ? ' high' : ''}">${fmtDmg(totalDmg)}</span></div>
    ${condRows}
    ${alertBanner}
    <div class="total-row"><span class="k">STL Fuel Used</span><span class="v">${totalFuelStl.toFixed(1)} units</span></div>
    ${shieldRec}
    <div class="note" style="margin-top:0.75rem">STL: transfer ellipse arc rendezvous solver (paper §8). TO/LDG: paper §12.4. FTL: A·e^(−β·ρ)·d + charges (paper §12.1–12.3); gateway 3 pc/hr + 1220s (§12.6). Damage: shielding applied per component (general/radiation/heat); landing damage = M2 fit (2026-07-05), departure-thrust term estimated. DEP fuel scales with the fuel usage factor (capped at the physics-computed max). APPROACH fuel = STL tank capacity × 0.491 × fuel usage factor (empirically confirmed across 3 tank sizes).</div>
  `;

  resEl.innerHTML = html;
}

function legHtml(type, dest, rows, extra, dmg, note) {
  const dmgClass = dmg > 0.05 ? 'leg-dmg high' : 'leg-dmg';
  const rowsHtml = rows.map(([k, v]) => `<div class="leg-stat"><span class="k">${k}</span><span class="v">${v}</span></div>`).join('');
  return `
    <div class="leg">
      <div class="leg-head">
        <span class="leg-type ${type.toLowerCase()}">${type}</span>
        <span class="leg-dest">${dest}</span>
      </div>
      <div class="leg-body">
        ${rowsHtml}
        ${extra ? `<div style="margin-top:3px">${extra}</div>` : ''}
        ${note ? `<div class="note" style="margin-top:3px">${note}</div>` : ''}
      </div>
    </div>`;
}

function planetHazardBadges(p) {
  let s = '<div class="hz">';
  if (p.Pressure > 2) s += `<span class="hz-badge hz-heat" title="${p.Pressure.toFixed(1)} atm">HEAT</span>`;
  if (p.Gravity > 2.0 || p.Gravity < 0.25) s += `<span class="hz-badge hz-grav" title="${p.Gravity.toFixed(2)}g">GRAV</span>`;
  s += '</div>';
  return s;
}

function buildShieldRec(origin, dest, sameSys) {
  const planets = [origin?.planetId, dest?.planetId].filter(Boolean).map(id => _planets[id]).filter(Boolean);
  const needHeat = planets.some(p => p.Pressure > 2);
  const needGrav = planets.some(p => p.Gravity > 2.0 || p.Gravity < 0.25);
  const sysIds = sameSys ? [dest.sysId] : (() => {
    if (!origin?.sysId || !dest?.sysId) return [];
    const path = bfs(origin.sysId, dest.sysId) || [];
    return path.map(id => id);
  })();
  const maxLum = Math.max(0, ...sysIds.map(id => (_sysStats[id] || {}).luminosity || 0));
  const maxDen = Math.max(0, ...sysIds.map(id => (_sysStats[id] || {}).meteoroidDensity || 0));
  const recs = [];
  if (needHeat) recs.push('<span class="hz-badge hz-heat">HEAT shield</span>');
  if (needGrav) recs.push('<span class="hz-badge hz-grav">GRAV stabilizer</span>');
  if (maxLum > 100) recs.push('<span class="hz-badge hz-rad" style="color:#f87171">RAD shield ★</span>');
  else if (maxLum > 10) recs.push('<span class="hz-badge hz-rad">RAD shield</span>');
  if (maxDen > 3.5) recs.push('<span class="hz-badge hz-met" style="color:#f87171">WHIPPLE ★</span>');
  else if (maxDen > 2.0) recs.push('<span class="hz-badge hz-met">WHIPPLE shield</span>');
  if (!recs.length) return '';
  return `<div class="total-row" style="margin-top:4px"><span class="k">Shields Recommended</span><span class="v"><div class="hz">${recs.join(' ')}</div></span></div>`;
}

function primePlanetInSys(sysId) {
  const candidates = Object.values(_planets).filter(p => p.SystemId === sysId && p.Surface);
  if (!candidates.length) return null;
  // Prefer planet whose name matches the system name (station eponym: "Hortus" system → "Hortus" planet)
  const sys = _systems[sysId];
  if (sys?.Name && sys.Name !== sys.NaturalId) {
    const match = candidates.find(p => p.PlanetName === sys.Name);
    if (match) return match;
  }
  return candidates.reduce((a, b) => (a.OrbitIndex < b.OrbitIndex ? a : b));
}

// ── Init ──────────────────────────────────────────────────────────────────────

(async () => {
  document.getElementById('fioKey').value  = localStorage.getItem(FIO_KEY)  || '';
  document.getElementById('fioUser').value = localStorage.getItem(FIO_USER) || '';
  await loadData();
  await loadShips();        // auto-load the fleet (read-only key)
})();
</script>
