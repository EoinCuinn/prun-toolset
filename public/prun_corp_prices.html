<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corp Price List — PrUn Tools</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #181c27;
    --bg3: #1e2333;
    --border: #2a3045;
    --text: #e2e8f0;
    --text2: #8892a4;
    --text3: #555f72;
    --accent: #4f8ef7;
    --green: #4ade80;
    --amber: #f7c94f;
    --red: #f87171;
    --mono: 'Courier New', monospace;
    --radius: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    padding: 1.5rem;
    max-width: 900px;
    margin: 0 auto;
  }

  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    gap: 10px;
  }
  .title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .title::before {
    content: '';
    display: inline-block;
    width: 3px;
    height: 14px;
    background: var(--accent);
    border-radius: 2px;
  }
  .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  input[type="password"], input[type="text"] {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 10px;
    border-radius: var(--radius);
    outline: none;
  }
  input:focus { border-color: var(--accent); }
  #fioKey { width: 220px; }

  button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    padding: 6px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button:disabled { opacity: 0.4; cursor: default; }
  button.primary { border-color: var(--accent); color: var(--accent); }
  button.primary:hover { background: var(--accent); color: #0f1117; }
  button.active { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,0.1); }

  /* ── Watchlist bar ─────────────────────────────────── */
  .watchlist-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    padding: 10px 12px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .view-btns { display: flex; gap: 4px; flex-shrink: 0; }
  .view-btn {
    padding: 4px 10px;
    font-size: 11px;
    letter-spacing: 0.08em;
  }
  .wl-chips { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; align-items: center; }
  .wl-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 4px 2px 8px;
    background: rgba(79,142,247,0.1);
    border: 1px solid rgba(79,142,247,0.25);
    border-radius: 3px;
    font-size: 11px;
    font-weight: 700;
    font-family: var(--mono);
    color: var(--accent);
    letter-spacing: 0.06em;
  }
  .wl-chip button {
    border: none;
    padding: 0 2px;
    color: var(--text3);
    font-size: 13px;
    line-height: 1;
    background: transparent;
  }
  .wl-chip button:hover { color: var(--red); border: none; }
  .wl-empty { font-size: 11px; color: var(--text3); font-family: var(--mono); }

  .wl-add-row { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  #wlInput {
    width: 80px;
    padding: 4px 8px;
    font-size: 12px;
    text-transform: uppercase;
  }
  .wl-add-btn {
    padding: 4px 10px;
    font-size: 11px;
  }

  /* ── Status / summary ──────────────────────────────── */
  .status {
    font-size: 12px;
    color: var(--text3);
    font-family: var(--mono);
    min-height: 18px;
    margin-bottom: 0.75rem;
  }
  .status.loading { color: var(--accent); }
  .status.ok      { color: var(--green); }
  .status.error   { color: var(--red); }

  .summary {
    display: flex;
    gap: 20px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .summary-stat { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .summary-stat span { color: var(--text2); }

  /* ── Table ─────────────────────────────────────────── */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    background: var(--bg2);
    color: var(--text3);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { color: var(--accent); }
  thead th.sorted { color: var(--accent); }
  thead th.n { text-align: right; }
  thead th.add-col { width: 32px; cursor: default; }
  tbody tr { border-bottom: 1px solid #1a1f2e; transition: background 0.1s; }
  tbody tr:hover { background: var(--bg2); }
  td { padding: 8px 12px; font-family: var(--mono); font-size: 13px; white-space: nowrap; }
  td.n { text-align: right; }
  td.add-col { text-align: center; padding: 4px 8px; }

  .add-btn {
    padding: 1px 7px;
    font-size: 13px;
    border-color: var(--text3);
    color: var(--text3);
  }
  .add-btn:hover { border-color: var(--green); color: var(--green); }
  .add-btn.in-list { border-color: var(--border); color: var(--border); cursor: default; }
  .add-btn.in-list:hover { border-color: var(--border); color: var(--border); }

  .ticker-badge {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    background: rgba(79,142,247,0.12);
    color: var(--accent);
    border: 1px solid rgba(79,142,247,0.25);
  }
  .disc {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .disc-high { background: rgba(74,222,128,0.12); color: var(--green); border: 1px solid rgba(74,222,128,0.25); }
  .disc-mid  { background: rgba(247,201,79,0.12); color: var(--amber); border: 1px solid rgba(247,201,79,0.25); }
  .disc-low  { background: rgba(241,95,79,0.10);  color: var(--red);   border: 1px solid rgba(241,95,79,0.20); }
  .disc-none { background: rgba(85,95,114,0.15);  color: var(--text3); border: 1px solid rgba(85,95,114,0.2); }
  .no-cx { color: var(--text3); font-size: 11px; }
</style>
</head>
<body>

<a href="/home.html" style="position:fixed;top:16px;right:16px;background:var(--bg2);color:var(--accent);border:1px solid var(--border);border-radius:4px;padding:6px 12px;font-size:12px;font-family:var(--mono);text-decoration:none;letter-spacing:0.05em;z-index:100;">⌂ HOME</a>

<div class="page-header">
  <h1 class="title">Corp Price List</h1>
  <div class="controls">
    <input id="fioKey" type="password" placeholder="FIO API key" oninput="saveFioKey()" />
    <button class="primary" id="refreshBtn" onclick="load()">↻ REFRESH</button>
  </div>
</div>

<!-- Watchlist bar -->
<div class="watchlist-bar">
  <div class="view-btns">
    <button class="view-btn active" id="btnMine" onclick="setView('mine')">MY LIST</button>
    <button class="view-btn" id="btnAll"  onclick="setView('all')">ALL</button>
  </div>
  <div class="wl-chips" id="wlChips">
    <span class="wl-empty">No items — add tickers below or use + in All view</span>
  </div>
  <div class="wl-add-row">
    <input id="wlInput" type="text" placeholder="PSM…" maxlength="8"
      onkeydown="if(event.key==='Enter') addFromInput()" />
    <button class="wl-add-btn" onclick="addFromInput()">+ ADD</button>
  </div>
</div>

<div class="status" id="status">Press REFRESH to load prices.</div>

<div class="summary" id="summary" style="display:none">
  <div class="summary-stat">Items: <span id="statCount">—</span></div>
  <div class="summary-stat">No CX data: <span id="statNoCx">—</span></div>
  <div class="summary-stat">Updated: <span id="statTime">—</span></div>
</div>

<table id="priceTable" style="display:none">
  <thead>
    <tr>
      <th class="add-col"></th>
      <th id="hTicker" onclick="sortBy('ticker')">Ticker</th>
      <th class="n sorted" id="hDisc" onclick="sortBy('disc')">Discount ▾</th>
      <th class="n" id="hCorp" onclick="sortBy('corp')">Corp Price</th>
      <th class="n" id="hCx" onclick="sortBy('cx')">IC1 Ask</th>
      <th class="n" id="hAbove" onclick="sortBy('above')">Corp vs CX</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSG_rqZ_TCSTe12_FzJRw0_mbDCYJ5HnGvnmgI3Sd-CFd0AxkSzc88e3glLeM-5ZpI2ILcFSzEX8Nvg/pub?output=csv';
const FIO = 'https://rest.fnar.net';

let _rows    = [];
let _sortKey = 'disc';
let _sortAsc = false;
let _view    = 'mine';
let _watchlist = [];

// ── Keys ────────────────────────────────────────────────
function getFioKey() {
  return document.getElementById('fioKey')?.value?.trim() || localStorage.getItem('prun_apikey') || '';
}
function saveFioKey() {
  const k = getFioKey();
  if (k) localStorage.setItem('prun_apikey', k);
}

// ── Watchlist ────────────────────────────────────────────
function loadWatchlist() {
  try { _watchlist = JSON.parse(localStorage.getItem('prun_corp_watchlist') || '[]'); }
  catch { _watchlist = []; }
}
function saveWatchlist() {
  localStorage.setItem('prun_corp_watchlist', JSON.stringify(_watchlist));
}
function addTicker(t) {
  t = t.toUpperCase().trim();
  if (t && !_watchlist.includes(t)) { _watchlist.push(t); saveWatchlist(); renderWatchlistBar(); render(); }
}
function removeTicker(t) {
  _watchlist = _watchlist.filter(x => x !== t);
  saveWatchlist(); renderWatchlistBar(); render();
}
function addFromInput() {
  const inp = document.getElementById('wlInput');
  addTicker(inp.value);
  inp.value = '';
}

function renderWatchlistBar() {
  const el = document.getElementById('wlChips');
  if (_watchlist.length === 0) {
    el.innerHTML = '<span class="wl-empty">No items — add tickers below or use + in All view</span>';
  } else {
    el.innerHTML = _watchlist.map(t =>
      `<span class="wl-chip">${t}<button onclick="removeTicker('${t}')" title="Remove">×</button></span>`
    ).join('');
  }
}

// ── View toggle ──────────────────────────────────────────
function setView(v) {
  _view = v;
  document.getElementById('btnMine').classList.toggle('active', v === 'mine');
  document.getElementById('btnAll').classList.toggle('active',  v === 'all');
  render();
}

// ── Status ───────────────────────────────────────────────
function setStatus(msg, cls = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + cls;
}

// ── CSV / Sheet ──────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  for (const line of text.split(/\r?\n/)) {
    const row = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
      else if (ch === ',' && !inQ) { row.push(cur); cur = ''; }
      else cur += ch;
    }
    row.push(cur);
    rows.push(row);
  }
  return rows;
}

function parseSheet(text) {
  const map = {};
  for (const row of parseCSV(text)) {
    if (row.length < 3) continue;
    const ticker = row[1].trim().toUpperCase();
    const priceRaw = row[2].trim().replace(/,/g, '');
    if (!ticker || ticker === 'MAT' || ticker.startsWith('#')) continue;
    const price = parseFloat(priceRaw);
    if (!isNaN(price) && price > 0) map[ticker] = price;
  }
  return map;
}

// ── Load ─────────────────────────────────────────────────
async function load() {
  document.getElementById('refreshBtn').disabled = true;
  document.getElementById('priceTable').style.display = 'none';
  document.getElementById('summary').style.display = 'none';
  setStatus('Fetching corp price schedule…', 'loading');

  try {
    const key = getFioKey();
    const [sheetRes, exRes] = await Promise.all([
      fetch(SHEET_URL),
      fetch(`${FIO}/exchange/full`, { headers: key ? { 'Authorization': key } : {} }),
    ]);
    if (!sheetRes.ok) throw new Error(`Sheet HTTP ${sheetRes.status}`);
    if (!exRes.ok)    throw new Error(`FIO HTTP ${exRes.status}`);

    const [sheetText, exData] = await Promise.all([sheetRes.text(), exRes.json()]);
    const corpPrices = parseSheet(sheetText);

    const ic1 = {};
    exData.forEach(x => {
      if (x.ExchangeCode === 'IC1' && x.Ask > 0) ic1[x.MaterialTicker] = x.Ask;
    });

    _rows = Object.entries(corpPrices).map(([ticker, corp]) => {
      const cx   = ic1[ticker] ?? null;
      const disc = cx ? (cx - corp) / cx * 100 : null;
      const above = cx ? corp - cx : null;
      return { ticker, corp, cx, disc, above };
    });

    render();

    const noCx = _rows.filter(r => r.cx === null).length;
    document.getElementById('statCount').textContent = _rows.length;
    document.getElementById('statNoCx').textContent  = noCx;
    document.getElementById('statTime').textContent  = new Date().toLocaleTimeString();
    document.getElementById('summary').style.display = 'flex';
    setStatus(`✓ ${_rows.length} corp items loaded.`, 'ok');
  } catch(e) {
    setStatus('Error: ' + e.message, 'error');
  } finally {
    document.getElementById('refreshBtn').disabled = false;
  }
}

// ── Sort ─────────────────────────────────────────────────
function sortBy(key) {
  if (_sortKey === key) _sortAsc = !_sortAsc;
  else { _sortKey = key; _sortAsc = key === 'ticker'; }
  ['ticker','disc','corp','cx','above'].forEach(k => {
    const el = document.getElementById('h' + k.charAt(0).toUpperCase() + k.slice(1));
    if (el) el.className = (k === _sortKey ? 'sorted' : '') + (k !== 'ticker' ? ' n' : '');
  });
  render();
}

// ── Render ───────────────────────────────────────────────
function render() {
  let visible = _view === 'mine'
    ? _rows.filter(r => _watchlist.includes(r.ticker))
    : [..._rows];

  // In "mine" view, preserve watchlist order unless user has sorted
  if (_view === 'mine' && _sortKey === 'disc' && !_sortAsc) {
    visible.sort((a, b) => _watchlist.indexOf(a.ticker) - _watchlist.indexOf(b.ticker));
  } else {
    visible.sort((a, b) => {
      let av = a[_sortKey], bv = b[_sortKey];
      if (av === null && bv === null) return 0;
      if (av === null) return 1;
      if (bv === null) return -1;
      if (typeof av === 'string') return _sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
      return _sortAsc ? av - bv : bv - av;
    });
  }

  const fmt = n => n == null ? '—'
    : n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  if (_view === 'mine' && visible.length === 0) {
    document.getElementById('priceTable').style.display = 'none';
    if (_rows.length > 0) setStatus('No items in your list — add tickers or switch to All view.', '');
    return;
  }

  document.getElementById('tbody').innerHTML = visible.map(r => {
    const inList = _watchlist.includes(r.ticker);
    const addBtn = _view === 'all'
      ? `<button class="add-btn${inList ? ' in-list' : ''}" onclick="${inList ? '' : `addTicker('${r.ticker}')`}" title="${inList ? 'In list' : 'Add to My List'}">+</button>`
      : '';

    const discClass = r.disc == null ? 'disc-none'
      : r.disc >= 20 ? 'disc-high'
      : r.disc >= 10 ? 'disc-mid'
      : 'disc-low';
    const discLabel = r.disc == null ? 'no data'
      : (r.disc >= 0 ? '↓ ' : '↑ ') + Math.abs(r.disc).toFixed(1) + '%';

    const aboveCol = r.above == null ? '' : r.above > 0 ? 'color:var(--green)' : r.above < 0 ? 'color:var(--red)' : '';
    const aboveStr = r.above == null ? '<span class="no-cx">—</span>'
      : `<span style="${aboveCol}">${r.above >= 0 ? '+' : ''}${fmt(r.above)}</span>`;

    return `<tr>
      <td class="add-col">${addBtn}</td>
      <td><span class="ticker-badge">${r.ticker}</span></td>
      <td class="n"><span class="disc ${discClass}">${discLabel}</span></td>
      <td class="n">${fmt(r.corp)} <span style="color:var(--text3);font-size:11px">ICA</span></td>
      <td class="n">${r.cx != null ? fmt(r.cx) + ' <span style="color:var(--text3);font-size:11px">ICA</span>' : '<span class="no-cx">no listing</span>'}</td>
      <td class="n">${aboveStr}</td>
    </tr>`;
  }).join('');

  document.getElementById('priceTable').style.display = 'table';
}

// ── Init ─────────────────────────────────────────────────
loadWatchlist();
renderWatchlistBar();
const _saved = localStorage.getItem('prun_apikey') || '';
if (_saved) document.getElementById('fioKey').value = _saved;
load();
</script>
</body>
</html>
