<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrUn Price Converter</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #181c27;
    --bg3: #1e2333;
    --border: #2a3045;
    --border2: #3a4460;
    --text: #e2e8f0;
    --text2: #8892a4;
    --text3: #555f72;
    --dim: #555f72;
    --accent: #4f8ef7;
    --green: #4ade80;
    --orange: #fb923c;
    --red: #f87171;
    --mono: 'Courier New', monospace;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    padding: 1.5rem;
    max-width: 960px;
    margin: 0 auto;
  }

  .page-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    gap: 12px;
  }
  .header-left { display: flex; flex-direction: column; gap: 2px; }
  .title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .title::before {
    content: '';
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
  }
  .subtitle {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.05em;
  }
  .home-link {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
    text-decoration: none;
    letter-spacing: 0.05em;
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 3px;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .home-link:hover { color: var(--text); border-color: var(--border2); }

  .section-head {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
    margin: 1.5rem 0 0.75rem;
  }

  button {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
    font-family: inherit;
  }
  button:hover { background: var(--border); border-color: var(--accent); }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  button.primary:hover { background: #6aa0f9; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .action-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .action-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .action-desc {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    line-height: 1.7;
  }
  .action-desc a {
    color: var(--accent);
    text-decoration: none;
  }
  .action-desc a:hover { text-decoration: underline; }

  .status-line {
    font-family: var(--mono);
    font-size: 12px;
    min-height: 18px;
  }
  .status-line.idle    { color: var(--text3); }
  .status-line.loading { color: var(--accent); }
  .status-line.ok      { color: var(--green); }
  .status-line.error   { color: var(--red); }

  .preview-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .preview-table-wrap {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    max-height: 340px;
    overflow-y: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 12px;
  }
  thead th {
    background: var(--bg3);
    color: var(--text3);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
  }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg2); }
  tbody td {
    padding: 5px 12px;
    color: var(--text2);
  }
  tbody td:first-child { color: var(--text3); }
  tbody td:nth-child(4) { color: var(--accent); font-weight: 600; }
  tbody td:nth-child(5) { color: var(--green); }

  .stat-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .stat {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
  }
  .stat span { color: var(--text); font-weight: 600; }

  .search-wrap {
    margin-bottom: 0.75rem;
  }
  .search-wrap input {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 7px 12px;
    font-size: 12px;
    font-family: var(--mono);
    outline: none;
    width: 200px;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text3); }
  .no-results {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text3);
    padding: 12px;
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="header-left">
    <div class="title">Price Converter</div>
    <div class="subtitle">empire price schedule · prunplanner cx import</div>
  </div>
  <a href="/home.html" class="home-link">⌂ HOME</a>
</div>

<div class="section-head">Convert & Download</div>
<div class="action-box">
  <div class="action-desc">
    Fetches the Empire price schedule from Google Sheets, converts it to PrunPlanner-compatible semicolon CSV, and downloads it ready to import as a custom CX.
  </div>
  <div class="action-row">
    <button class="primary" id="fetchBtn">⬇ Fetch &amp; Convert</button>
    <button id="downloadBtn" disabled>↓ Download CSV</button>
    <div class="status-line idle" id="status">Ready.</div>
  </div>
</div>

<div id="previewSection" style="display:none">
  <div class="section-head">Preview</div>
  <div class="stat-row" id="statRow" style="margin-bottom:0.75rem"></div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Filter ticker…" autocomplete="off" />
  </div>
  <div class="preview-table-wrap">
    <table>
      <thead>
        <tr>
          <th>Location</th>
          <th>Type</th>
          <th>CX</th>
          <th>Ticker</th>
          <th>Price</th>
        </tr>
      </thead>
      <tbody id="previewBody"></tbody>
    </table>
  </div>
</div>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSG_rqZ_TCSTe12_FzJRw0_mbDCYJ5HnGvnmgI3Sd-CFd0AxkSzc88e3glLeM-5ZpI2ILcFSzEX8Nvg/pub?output=csv';

let convertedRows = [];

function parseCSV(text) {
  // Handles quoted fields with commas inside (e.g. "1,669.19")
  const rows = [];
  const lines = text.split(/\r?\n/);
  for (const line of lines) {
    const row = [];
    let cur = '';
    let inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
        else inQuote = !inQuote;
      } else if (ch === ',' && !inQuote) {
        row.push(cur); cur = '';
      } else {
        cur += ch;
      }
    }
    row.push(cur);
    rows.push(row);
  }
  return rows;
}

function convert(rawText) {
  const rows = parseCSV(rawText);
  const out = [];
  for (const row of rows) {
    if (row.length < 3) continue;
    const ticker = row[1].trim();
    const priceRaw = row[2].trim();
    if (!ticker || ticker === 'MAT' || ticker.startsWith('#')) continue;
    const price = priceRaw.replace(/,/g, '');
    if (isNaN(parseFloat(price))) continue;
    out.push({ ticker, price });
  }
  return out;
}

function toCSV(rows) {
  let csv = 'Location;Type;CX;Ticker;Price\r\n';
  for (const r of rows) {
    csv += `EMPIRE;BOTH;;${r.ticker};${r.price}\r\n`;
  }
  return csv;
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status-line ' + cls;
}

document.getElementById('fetchBtn').addEventListener('click', async () => {
  const fetchBtn = document.getElementById('fetchBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  fetchBtn.disabled = true;
  downloadBtn.disabled = true;
  document.getElementById('previewSection').style.display = 'none';
  setStatus('Fetching price schedule...', 'loading');

  try {
    const res = await fetch(SHEET_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    setStatus('Converting...', 'loading');

    convertedRows = convert(text);
    if (convertedRows.length === 0) throw new Error('No valid rows found in sheet.');

    // Render preview
    const tbody = document.getElementById('previewBody');
    tbody.innerHTML = convertedRows.map(r =>
      `<tr><td>EMPIRE</td><td>BOTH</td><td></td><td>${r.ticker}</td><td>${r.price}</td></tr>`
    ).join('');

    document.getElementById('statRow').innerHTML =
      `<div class="stat">Rows: <span>${convertedRows.length}</span></div>` +
      `<div class="stat">Format: <span>semicolon CSV</span></div>` +
      `<div class="stat">Location: <span>EMPIRE</span></div>`;

    document.getElementById('searchInput').value = '';
    document.getElementById('previewSection').style.display = '';
    downloadBtn.disabled = false;
    setStatus(`✓ ${convertedRows.length} items converted — ready to download.`, 'ok');
  } catch(e) {
    setStatus('Error: ' + e.message, 'error');
  } finally {
    fetchBtn.disabled = false;
  }
});

function filterTable() {
  const q = document.getElementById('searchInput').value.trim().toUpperCase();
  const rows = document.getElementById('previewBody').querySelectorAll('tr');
  let visible = 0;
  rows.forEach(row => {
    const ticker = row.cells[3] ? row.cells[3].textContent.toUpperCase() : '';
    const show = !q || ticker.includes(q);
    row.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  // show/hide no-results
  let noRes = document.getElementById('noResults');
  if (!noRes) {
    noRes = document.createElement('div');
    noRes.id = 'noResults';
    noRes.className = 'no-results';
    noRes.textContent = 'No matching tickers.';
    document.querySelector('.preview-table-wrap').after(noRes);
  }
  noRes.style.display = visible === 0 ? '' : 'none';
}

document.getElementById('searchInput').addEventListener('input', filterTable);

document.getElementById('downloadBtn').addEventListener('click', () => {
  if (convertedRows.length === 0) return;
  const csv = toCSV(convertedRows);
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const date = new Date().toISOString().slice(0,10);
  a.download = `empire_prices_${date}.csv`;
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
